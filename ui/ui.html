<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XMUM Freshman FAQ Chatbot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy: '#1f2a52',
            'navy-deep': '#19224a',
            'navy-card': '#2b3766',
            gold: '#d6a93f',
            'gold-strong': '#c6962f',
            'user-bubble': '#eef2fb',
            positive: '#2f9e5e',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            serif: ['Lora', 'Georgia', 'serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .scroll-thin::-webkit-scrollbar { width: 6px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 9999px; }
  </style>
</head>
<body class="bg-white text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ----------------------------- Icons ----------------------------- */
    const Icon = ({ d, className = "w-5 h-5", stroke = 1.8, fill = "none" }) => (
      <svg viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth={stroke}
           strokeLinecap="round" strokeLinejoin="round" className={className}>
        {d}
      </svg>
    );

    const icons = {
      enroll: <><path d="M4 6h16M4 6v12a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V6" /><path d="M8 10h8M8 14h5" /></>,
      money: <><circle cx="12" cy="12" r="9" /><path d="M12 7v10M9.5 9.5a2.5 2 0 0 1 5 0c0 2-5 1-5 3a2.5 2 0 0 0 5 0" /></>,
      aid: <><path d="M12 3l2.5 5 5.5.8-4 3.9 1 5.5-5-2.7-5 2.7 1-5.5-4-3.9 5.5-.8z" /></>,
      academics: <><path d="M3 7l9-4 9 4-9 4-9-4z" /><path d="M7 9.5V14c0 1.5 2.5 3 5 3s5-1.5 5-3V9.5" /></>,
      life: <><circle cx="9" cy="8" r="3" /><circle cx="17" cy="9" r="2.2" /><path d="M3.5 19c0-3 2.5-5 5.5-5s5.5 2 5.5 5M15 19c0-2 1-3.5 3-3.5" /></>,
      facilities: <><path d="M4 21V8l8-5 8 5v13" /><path d="M9 21v-6h6v6M8 11h.01M12 11h.01M16 11h.01" /></>,
      policies: <><path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z" /><path d="M9 12l2 2 4-4" /></>,
      bell: <><path d="M6 9a6 6 0 1 1 12 0c0 5 2 6 2 6H4s2-1 2-6z" /><path d="M10 20a2 2 0 0 0 4 0" /></>,
      chevron: <path d="M9 6l6 6-6 6" />,
      chevronDown: <path d="M6 9l6 6 6-6" />,
      user: <><circle cx="12" cy="8" r="4" /><path d="M4 20c0-4 3.5-6 8-6s8 2 8 6" /></>,
      tag: <><path d="M3 3h7l11 11-7 7L3 10V3z" /><circle cx="7.5" cy="7.5" r="1.5" /></>,
      shield: <path d="M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6l7-3z" />,
      clock: <><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></>,
      help: <><circle cx="12" cy="12" r="9" /><path d="M9.5 9a2.5 2.5 0 0 1 4 1.5c0 1.5-2 2-2 3M12 17h.01" /></>,
      thumbUp: <path d="M7 11v9H4v-9h3zm0 0l4-7a2 2 0 0 1 2 2v3h5a2 2 0 0 1 2 2.3l-1 6A2 2 0 0 1 16 20H7" />,
      thumbDown: <path d="M17 13V4h3v9h-3zm0 0l-4 7a2 2 0 0 1-2-2v-3H6a2 2 0 0 1-2-2.3l1-6A2 2 0 0 1 8 4h9" />,
      send: <path d="M4 12l16-8-6 8 6 8-16-8zM10 12h10" />,
      headset: <><path d="M4 13v-1a8 8 0 0 1 16 0v1" /><path d="M4 13a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2 1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1zM20 13a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2 1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1z" /><path d="M18 19a4 4 0 0 1-4 3h-2" /></>,
    };

    /* ----------------------- Inline illustrations ----------------------- */
    /* University shield crest (gold) */
    const Crest = ({ className = "h-20 w-auto" }) => (
      <svg viewBox="0 0 100 120" className={className} fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 4 L92 16 V60 C92 88 74 106 50 116 C26 106 8 88 8 60 V16 Z"
              fill="#1f2a52" stroke="#d6a93f" strokeWidth="3" />
        <path d="M50 12 L84 22 V60 C84 83 69 99 50 108 C31 99 16 83 16 60 V22 Z"
              fill="none" stroke="#d6a93f" strokeWidth="1.5" opacity="0.6" />
        <line x1="50" y1="20" x2="50" y2="98" stroke="#d6a93f" strokeWidth="1" opacity="0.5" />
        <line x1="18" y1="58" x2="82" y2="58" stroke="#d6a93f" strokeWidth="1" opacity="0.5" />
        {/* cross top-left */}
        <path d="M34 30 v14 M28 36 h12" stroke="#d6a93f" strokeWidth="2.4" strokeLinecap="round" />
        {/* sunburst top-right */}
        <g stroke="#d6a93f" strokeWidth="1.6" strokeLinecap="round">
          <circle cx="66" cy="37" r="6" fill="none" />
          <line x1="66" y1="25" x2="66" y2="29" /><line x1="66" y1="45" x2="66" y2="49" />
          <line x1="54" y1="37" x2="58" y2="37" /><line x1="74" y1="37" x2="78" y2="37" />
          <line x1="58" y1="29" x2="61" y2="32" /><line x1="71" y1="42" x2="74" y2="45" />
          <line x1="74" y1="29" x2="71" y2="32" /><line x1="61" y1="42" x2="58" y2="45" />
        </g>
        {/* open book bottom */}
        <path d="M30 74 q20 -8 20 0 q0 -8 20 0 v14 q-20 -8 -20 0 q0 -8 -20 0 Z"
              fill="none" stroke="#d6a93f" strokeWidth="2" strokeLinejoin="round" />
      </svg>
    );

    /* Faint campus building line illustration */
    const Building = ({ className = "", opacity = 0.25 }) => (
      <svg viewBox="0 0 240 120" className={className} fill="none" preserveAspectRatio="xMidYMax meet"
           stroke="#ffffff" strokeWidth="1" opacity={opacity}>
        <line x1="0" y1="118" x2="240" y2="118" />
        {/* left wing */}
        <rect x="14" y="74" width="56" height="44" />
        <line x1="26" y1="74" x2="26" y2="118" /><line x1="42" y1="74" x2="42" y2="118" /><line x1="58" y1="74" x2="58" y2="118" />
        {/* central building */}
        <rect x="84" y="52" width="72" height="66" />
        <polygon points="84,52 120,28 156,52" />
        <line x1="98" y1="52" x2="98" y2="118" /><line x1="120" y1="46" x2="120" y2="118" /><line x1="142" y1="52" x2="142" y2="118" />
        {/* central tower */}
        <rect x="112" y="14" width="16" height="20" />
        <polygon points="112,14 120,2 128,14" />
        {/* arched windows */}
        <path d="M92 88 q6 -8 12 0 v16 h-12 Z" /><path d="M114 88 q6 -8 12 0 v16 h-12 Z" /><path d="M136 88 q6 -8 12 0 v16 h-12 Z" />
        {/* right wing */}
        <rect x="170" y="74" width="56" height="44" />
        <line x1="182" y1="74" x2="182" y2="118" /><line x1="198" y1="74" x2="198" y2="118" /><line x1="214" y1="74" x2="214" y2="118" />
        {/* trees */}
        <circle cx="8" cy="100" r="9" /><circle cx="232" cy="100" r="9" />
      </svg>
    );

    /* Clean XMUM-style chatbot avatar */
    const ChatbotAvatar = ({ className = "h-12 w-12" }) => (
      <svg viewBox="0 0 100 100" className={className} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="avatarBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#eef2fb" />
            <stop offset="100%" stopColor="#dfe7fb" />
          </linearGradient>
        </defs>
        <circle cx="50" cy="50" r="44" fill="url(#avatarBg)" stroke="#cfd8f3" strokeWidth="2" />
        <circle cx="50" cy="52" r="22" fill="#ffffff" stroke="#1f2a52" strokeWidth="2.4" />
        <path d="M33 35l17-8 17 8-17 8-17-8z" fill="#1f2a52" />
        <path d="M41 41v7c0 2 4 4 9 4s9-2 9-4v-7" fill="none" stroke="#d6a93f" strokeWidth="2" strokeLinecap="round" />
        <path d="M67 37v10" stroke="#1f2a52" strokeWidth="2" strokeLinecap="round" />
        <circle cx="67" cy="49" r="2.2" fill="#d6a93f" />
        <circle cx="43" cy="52" r="2.6" fill="#1f2a52" />
        <circle cx="57" cy="52" r="2.6" fill="#1f2a52" />
        <path d="M43 61c3.2 3.5 10.8 3.5 14 0" fill="none" stroke="#1f2a52" strokeWidth="2.4" strokeLinecap="round" />
        <rect x="28" y="69" width="44" height="13" rx="6.5" fill="#1f2a52" opacity="0.96" />
        <text x="50" y="78" textAnchor="middle" fontFamily="Inter, sans-serif" fontSize="10" fontWeight="700" fill="#ffffff" letterSpacing="0.6">XMUM BOT</text>
      </svg>
    );

    const categories = [
      { id: 1, label: "Academic Affairs", icon: icons.academics },
      { id: 2, label: "IT Support", icon: icons.headset },
      { id: 3, label: "Registration & Orientation", icon: icons.enroll },
      { id: 4, label: "Campus Services", icon: icons.facilities },
      { id: 5, label: "Accommodation & Living", icon: icons.life },
      { id: 6, label: "Transportation", icon: icons.clock },
      { id: 7, label: "Finance & Fees", icon: icons.money },
    ];

    const recentChats = [
      { q: "I lost my student ID. What should I do?", t: "10:24 AM", active: true },
      { q: "How do I connect to campus Wi-Fi?", t: "Yesterday" },
      { q: "When is the course registration deadline?", t: "May 20" },
      { q: "Where can I pay my tuition fees?", t: "May 18" },
      { q: "How can I apply for hostel accommodation?", t: "May 15" },
    ];

    const relatedQuestions = [
      "How do I apply for a new student ID?",
      "Is there a replacement fee for a student ID?",
      "Where is the Student Services Centre?",
    ];

    /* ----------------------------- Sidebar ----------------------------- */
    function Sidebar() {
      const [active, setActive] = useState(1);
      return (
        <aside className="relative hidden md:flex w-[260px] shrink-0 flex-col bg-navy text-white overflow-hidden">
          {/* Header / crest */}
          <div className="relative z-10 px-6 pt-7 text-center">
            <Crest className="mx-auto h-20 w-auto" />
            <p className="mt-2 text-[11px] font-semibold tracking-[0.15em] text-gold">XIAMEN UNIVERSITY MALAYSIA</p>
            <h1 className="mt-5 font-serif text-[26px] leading-7 font-semibold text-white text-left">
              XMUM<br />Freshman<br />FAQ Chatbot
            </h1>
          </div>

          {/* Categories */}
          <div className="relative z-10 mt-5 px-4">
            <div className="border-t border-white/15 pt-4">
              <p className="px-2 text-[11px] font-semibold tracking-[0.18em] text-gold">CHAT HISTORY</p>
              <nav className="mt-3 space-y-1">
                {recentChats.map((c, i) => {
                  const isActive = i === 0;
                  return (
                    <button key={i} onClick={() => setActive(i)}
                      className={"flex w-full items-start gap-3 rounded-lg px-3 py-2.5 text-left text-[13px] transition " +
                        (isActive ? "bg-white/10 font-semibold border-l-2 border-gold" : "text-white/80 hover:bg-white/5 border-l-2 border-transparent")}>
                      <span className={isActive ? "mt-0.5 text-gold" : "mt-0.5 text-white/70"}>
                        <Icon d={icons.clock} className="w-5 h-5" />
                      </span>
                      <span className="min-w-0">
                        <span className="block truncate leading-snug">{c.q}</span>
                        <span className="mt-1 block text-[10px] font-normal text-white/45">{c.t}</span>
                      </span>
                    </button>
                  );
                })}
              </nav>
            </div>
          </div>

          {/* Subtle campus signature: no external image dependency */}
          <div className="pointer-events-none absolute inset-x-0 bottom-0 z-0 h-44 opacity-25">
            <Building className="h-full w-full" opacity={0.55} />
          </div>
          {/* Help card */}
          <div className="relative z-10 mt-auto p-4">
            <button className="flex w-full items-center gap-3 rounded-xl bg-gold px-4 py-3 text-left text-navy shadow-lg">
              <span className="grid h-9 w-9 place-items-center rounded-full bg-navy text-gold shrink-0">
                <Icon d={icons.headset} className="w-5 h-5" />
              </span>
              <span className="leading-tight">
                <span className="block text-[13px] font-bold">Need more help?</span>
                <span className="block text-[11px] opacity-80">Ask Student Services Centre</span>
              </span>
              <span className="ml-auto"><Icon d={icons.chevron} className="w-4 h-4" /></span>
            </button>
          </div>
        </aside>
      );
    }

    /* ----------------------------- Chat Panel ----------------------------- */
    function ChatPanel() {
      return (
        <section className="flex min-w-0 flex-1 flex-col bg-white">
          {/* Header */}
          <header className="relative flex items-center gap-4 border-b border-slate-200 px-6 py-4 overflow-hidden shrink-0">
            <div className="pointer-events-none absolute right-24 top-1/2 -translate-y-1/2 h-24 w-64 opacity-30">
              <Building className="h-full w-full" opacity={0.3} />
            </div>
            <ChatbotAvatar className="h-12 w-12" />
            <div className="relative z-10">
              <h2 className="font-serif text-2xl font-semibold text-navy">Hello, Freshman!</h2>
              <p className="text-sm text-slate-500">Prototype FAQ support for XMUM freshman enquiries.</p>
            </div>
            <div className="relative z-10 ml-auto flex items-center gap-4">
              <button className="text-slate-500 hover:text-navy"><Icon d={icons.bell} className="w-5 h-5" /></button>
              <div className="flex items-center gap-1">
                <span className="grid h-9 w-9 place-items-center rounded-full bg-navy text-xs font-bold text-white">YY</span>
                <Icon d={icons.chevronDown} className="w-4 h-4 text-slate-500" />
              </div>
            </div>
          </header>

          {/* Messages */}
          <div className="scroll-thin flex-1 overflow-y-auto px-6 py-6">
            {/* User bubble */}
            <div className="flex items-start justify-end gap-3">
              <div className="max-w-md rounded-2xl rounded-tr-sm bg-user-bubble px-4 py-3">
                <p className="text-sm text-slate-800">I lost my student ID. What should I do?</p>
                <p className="mt-2 text-right text-[11px] text-slate-400">10:24 AM</p>
              </div>
              <span className="grid h-9 w-9 shrink-0 place-items-center rounded-full bg-navy text-white">
                <Icon d={icons.user} className="w-5 h-5" />
              </span>
            </div>

            {/* Bot bubble */}
            <div className="mt-6 flex items-start gap-3">
              <ChatbotAvatar className="h-9 w-9 shrink-0" />
              <div className="max-w-2xl rounded-2xl rounded-tl-sm border border-slate-200 bg-white px-5 py-4 shadow-sm">
                <div className="flex flex-wrap items-center gap-2">
                  <span className="rounded-full bg-navy px-3 py-1 text-[11px] font-semibold text-white">Matched FAQ: CS_001</span>
                  <span className="rounded-full bg-green-50 px-3 py-1 text-[11px] font-semibold text-green-700">Confidence: High</span>
                  <span className="rounded-full bg-amber-50 px-3 py-1 text-[11px] font-semibold text-amber-700">Campus Services</span>
                </div>

                <p className="mt-4 text-sm leading-relaxed text-slate-700">
                  Based on the FAQ knowledge base, you should report the loss and apply for a replacement student ID. Please check the latest replacement procedure and fee requirement with the relevant XMUM office before making any payment.
                </p>

                <div className="mt-4 rounded-xl border border-slate-200 bg-slate-50 p-4">
                  <div className="flex items-center gap-2 text-navy">
                    <span className="grid h-8 w-8 place-items-center rounded-full bg-gold/20 text-gold-strong">
                      <Icon d={icons.policies} className="w-4 h-4" />
                    </span>
                    <h3 className="text-sm font-bold">Suggested Next Steps</h3>
                  </div>
                  <ol className="mt-3 space-y-3 text-sm text-slate-700">
                    {[
                      ["Report the loss", "Contact the relevant campus service counter as soon as possible."],
                      ["Apply for replacement", "Prepare your student details and follow the official replacement procedure."],
                      ["Confirm fee requirement", "Check whether a replacement fee is required before making payment."],
                      ["Collect the new ID", "Collect the replacement card after the request has been processed."],
                    ].map(([title, desc], i) => (
                      <li key={title} className="flex gap-3">
                        <span className="grid h-6 w-6 shrink-0 place-items-center rounded-full bg-navy text-[11px] font-bold text-white">{i + 1}</span>
                        <span><span className="font-semibold text-navy">{title}</span><br /><span className="text-slate-500">{desc}</span></span>
                      </li>
                    ))}
                  </ol>
                </div>

                <div className="mt-4 grid gap-3 sm:grid-cols-2">
                  <div className="rounded-lg border border-slate-200 p-3">
                    <p className="text-[11px] font-semibold tracking-wide text-slate-400">RELATED OFFICE</p>
                    <p className="mt-1 text-sm font-semibold text-navy">Student Services Centre</p>
                  </div>
                  <div className="rounded-lg border border-slate-200 p-3">
                    <p className="text-[11px] font-semibold tracking-wide text-slate-400">RELATED CATEGORY</p>
                    <p className="mt-1 text-sm font-semibold text-navy">Finance &amp; Fees</p>
                  </div>
                </div>

                <p className="mt-4 rounded-lg bg-amber-50 px-3 py-2 text-xs leading-relaxed text-amber-800">
                  Prototype note: This answer is generated from the project FAQ database. Official policy-sensitive information should still be verified with the relevant XMUM office.
                </p>
                <p className="mt-4 text-[11px] text-slate-400">10:25 AM</p>
              </div>
            </div>

            {/* Feedback */}
            <div className="mt-3 flex items-center justify-end gap-2 pr-1 text-slate-400">
              <span className="text-xs">Was this helpful?</span>
              <button className="rounded-md border border-slate-200 p-1.5 hover:text-navy"><Icon d={icons.thumbUp} className="w-4 h-4" /></button>
              <button className="rounded-md border border-slate-200 p-1.5 hover:text-navy"><Icon d={icons.thumbDown} className="w-4 h-4" /></button>
            </div>
          </div>

          {/* Composer */}
          <div className="shrink-0 px-6 pb-5">
            <div className="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-2.5 shadow-sm">
              <input type="text" placeholder="Type your question here..." className="flex-1 bg-transparent text-sm text-slate-700 outline-none placeholder:text-slate-400" />
              <button className="grid h-9 w-9 place-items-center rounded-lg bg-navy text-white hover:bg-navy-deep">
                <Icon d={icons.send} className="w-5 h-5" />
              </button>
            </div>
            <p className="mt-3 text-center text-[11px] text-slate-400">Prototype interface only. The final system should connect this UI to the FAQ retrieval backend.</p>
          </div>
        </section>
      );
    }

    /* ----------------------------- Info Rail ----------------------------- */
    function Card({ children, className = "" }) {
      return <div className={"rounded-xl border border-slate-200 bg-white p-4 shadow-sm " + className}>{children}</div>;
    }

    function MetricRow({ label, value, hint, icon }) {
      return (
        <div className="flex items-start gap-3 rounded-lg border border-slate-200 bg-white p-3">
          <span className="mt-0.5 text-gold"><Icon d={icon} className="w-4 h-4" /></span>
          <span className="min-w-0">
            <span className="block text-[11px] font-semibold uppercase tracking-wide text-slate-400">{label}</span>
            <span className="block text-sm font-bold text-navy">{value}</span>
            {hint && <span className="mt-0.5 block text-[11px] leading-snug text-slate-500">{hint}</span>}
          </span>
        </div>
      );
    }

    function InfoRail() {
      return (
        <aside className="scroll-thin hidden w-[320px] shrink-0 flex-col gap-4 overflow-y-auto border-l border-slate-200 bg-slate-50 p-4 lg:flex">
          {/* System Understanding */}
          <Card>
            <div className="flex items-center gap-2 text-slate-400">
              <span className="text-gold"><Icon d={icons.tag} className="w-4 h-4" /></span>
              <span className="text-[11px] font-semibold tracking-wide">QUERY UNDERSTANDING</span>
            </div>
            <div className="mt-3 space-y-2">
              <MetricRow label="Predicted Category" value="Campus Services" hint="ML category classification" icon={icons.academics} />
              <MetricRow label="Detected Intent" value="ask_procedure" hint="Used for step-by-step answer card" icon={icons.policies} />
              <MetricRow label="Linked Entity" value="Student ID" hint="student card / ID card → Student ID" icon={icons.tag} />
            </div>
          </Card>

          {/* Confidence */}
          <Card>
            <div className="flex items-center gap-2 text-slate-400">
              <span className="text-gold"><Icon d={icons.shield} className="w-4 h-4" /></span>
              <span className="text-[11px] font-semibold tracking-wide">RESPONSE RELIABILITY</span>
            </div>
            <p className="mt-2 text-3xl font-bold text-positive">92%</p>
            <div className="mt-2 h-2 w-full overflow-hidden rounded-full bg-slate-100">
              <div className="h-full rounded-full bg-positive" style={{ width: "92%" }}></div>
            </div>
            <p className="mt-2 text-xs leading-relaxed text-slate-500">
              High confidence means the matched FAQ is likely relevant. Low-confidence queries should trigger fallback or related-question suggestions.
            </p>
          </Card>

          {/* Knowledge Enhancement */}
          <Card>
            <div className="flex items-center gap-2 text-slate-400">
              <span className="text-gold"><Icon d={icons.facilities} className="w-4 h-4" /></span>
              <span className="text-[11px] font-semibold tracking-wide">KNOWLEDGE ENHANCEMENT</span>
            </div>
