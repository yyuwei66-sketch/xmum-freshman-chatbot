n    th { color: var(--blue-dark); font-size: 13px; font-weight: 850; letter-spacing: .09em; text-transform: uppercase; background: rgba(233, 223, 207, .68); }\n    th:first-child, td:first-child { text-align: left; }\n    tbody tr:first-child td { color: var(--blue-dark); font-weight: 850; }\n    tbody tr:last-child td { border-bottom: 0; }\n    .insight { padding: 18px 24px; border-left: 5px solid var(--blue); background: rgba(22, 90, 145, .07); color: var(--ink); font-size: 19px; line-height: 1.36; }\n    .case { display: grid; grid-template-columns: .75fr 1.25fr; gap: 60px; align-items: center; }\n    .case h2 { max-width: 10ch; font-size: 76px; line-height: .94; }\n    .case-card { position: relative; padding: 30px 32px; border: 1px solid var(--line); background: rgba(255, 253, 248, .74); box-shadow: 0 18px 45px rgba(24, 36, 51, .08); }\n    .query-pill { display: inline-flex; padding: 10px 16px; border-radius: 999px; background: var(--ink); color: var(--white); font-weight: 800; letter-spacing: .02em; }\n    .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-top: 22px; }\n    .answer-box { min-height: 164px; padding: 20px; border: 1px solid var(--line); background: rgba(244, 239, 229, .62); }\n    .answer-box.expected { border-top: 5px solid var(--sage); }\n    .answer-box.retrieved { border-top: 5px solid var(--terracotta); }\n    .answer-box .id { color: var(--muted); font-size: 13px; font-weight: 850; letter-spacing: .12em; text-transform: uppercase; }\n    .answer-box p { margin-top: 13px; color: var(--ink); font-size: 18px; line-height: 1.32; }\n    .error-note { margin-top: 22px; padding: 18px 20px; border-left: 5px solid var(--terracotta); background: rgba(200, 101, 70, .08); color: var(--ink); font-size: 18px; line-height: 1.36; }\n    .score-badge { position: absolute; right: 32px; top: 22px; display: grid; place-items: center; width: 104px; height: 104px; border-radius: 50%; background: var(--blue); color: var(--white); box-shadow: 0 18px 40px rgba(22, 90, 145, .25); font-family: Georgia, serif; font-size: 28px; line-height: .95; text-align: center; }\n    .score-badge span { display: block; margin-top: 6px; font-family: \"Avenir Next\", sans-serif; font-size: 11px; letter-spacing: .13em; text-transform: uppercase; }\n    .progress { position: absolute; z-index: 10; left: 0; bottom: 0; width: 100%; height: 3px; pointer-events: none; }\n    .progress > span { display: block; width: 0; height: 100%; background: var(--terracotta); transition: width 240ms var(--ease); }\n    .counter { position: absolute; z-index: 10; left: 92px; bottom: 43px; color: rgba(24, 36, 51, .42); font-size: 12px; font-variant-numeric: tabular-nums; letter-spacing: .12em; pointer-events: none; }\n    .nav-zone { position: absolute; z-index: 5; top: 0; bottom: 0; width: 12%; border: 0; padding: 0; background: transparent; cursor: pointer; }\n    .nav-zone.prev { left: 0; }\n    .nav-zone.next { right: 0; }\n    .nav-zone:focus-visible { outline: 3px solid var(--blue); outline-offset: -8px; }\n    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; } }\n    @page { size: 16in 9in; margin: 0; }\n    @media print {\n      html, body { display: block; width: auto; height: auto; overflow: visible; background: #fff; print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n      .stage { width: 16in; height: auto; overflow: visible; box-shadow: none; }\n      .deck { position: relative; width: 16in; height: auto; transform: none; overflow: visible; }\n      .slide { position: relative; width: 16in; height: 9in; break-after: page; opacity: 1; visibility: visible; transform: none; transition: none; }\n      .slide .reveal { animation: none !important; }\n      .progress, .counter, .nav-zone { display: none; }\n    }\n  </style>\n</head>\n<body>\n  <div class=\"stage\">\n  <main class=\"deck\" aria-label=\"Retrieval-based chatbot slide presentation\">\n    <section class=\"slide hero is-active\" data-title=\"Retrieval-based Chatbot\" aria-hidden=\"false\" tabindex=\"-1\">\n      <div class=\"hero-copy\">\n        <p class=\"kicker reveal\">AIT103 · Hybrid FAQ Chatbot</p>\n        <h1 class=\"reveal d2\">Retrieval-based <em>chatbot</em></h1>\n        <p class=\"subtitle reveal d3\">How retrieval.py ranks FAQ answers with semantic, lexical, and token-level evidence.</p>\n      </div>\n      <div class=\"pipeline reveal d3\" role=\"img\" aria-label=\"Retrieval pipeline from user question through three score channels, RRF fusion, tie-breaker, fallback guard, and answer selection\">\n        <div class=\"pipe-step\"><span class=\"pipe-dot\">01</span><div><p class=\"pipe-name\">User question</p><p class=\"pipe-note\">A freshman asks in natural language</p></div></div>\n        <div class=\"pipe-step\"><span class=\"pipe-dot\">02</span><div><p class=\"pipe-name\">Three score channels</p><p class=\"pipe-note\">Embedding, TF-IDF, and token semantic matching</p></div></div>\n        <div class=\"pipe-step\"><span class=\"pipe-dot\">03</span><div><p class=\"pipe-name\">RRF fusion</p><p class=\"pipe-note\">Rank-level combination, not raw-score addition</p></div></div>\n        <div class=\"pipe-step\"><span class=\"pipe-dot\">04</span><div><p class=\"pipe-name\">Guarded answer</p><p class=\"pipe-note\">Fallback when evidence is weak</p></div></div>\n      </div>\n      <p class=\"hero-purpose reveal d4\">The module prefers answers that remain strong across several independent retrieval views.</p>\n      <div class=\"footer\">ZHANG JINYU <span>/ AIT2509057</span></div>\n    </section>\n    <section class=\"slide score-grid\" data-title=\"Three Retrieval Scores\" aria-hidden=\"true\" tabindex=\"-1\">\n      <header><p class=\"kicker reveal\">01 · Build independent evidence</p><h2 class=\"slide-title reveal d2\">Three Retrieval Scores</h2></header>\n      <div class=\"score-cards reveal d3\">\n        <article class=\"score-card\"><span class=\"score-index\">01</span><h3>Sentence embedding similarity</h3><p>Encodes the whole user question and compares it with pre-computed FAQ question embeddings. Unit-normalized embeddings make the dot product behave like cosine similarity.</p><div class=\"formula code\"><span class=\"math-main\">s<sub>embed</sub>(i) = q · d<sub>i</sub></span><span class=\"math-main\">= cos(q, d<sub>i</sub>)</span><span class=\"math-note\">q: user question · d<sub>i</sub>: FAQ question i</span></div></article>\n        <article class=\"score-card\"><span class=\"score-index\">02</span><h3>TF-IDF sentence similarity</h3><p>Transforms the question into a TF-IDF vector and compares it with all FAQ questions. This captures exact words, short phrases, and lexical anchors.</p><div class=\"formula code\"><span class=\"math-main\">s<sub>tfidf</sub>(i) = <span class=\"frac\"><span>v<sub>q</sub> · v<sub>i</sub></span><span>||v<sub>q</sub>|| ||v<sub>i</sub>||</span></span></span><span class=\"math-note\">Cosine similarity over TF-IDF vectors</span></div></article>\n        <article class=\"score-card\"><span class=\"score-index\">03</span><h3>Token-level embedding similarity</h3><p>Removes stopwords, compares every query token with candidate question + keyword tokens, then averages each token's best semantic match.</p><div class=\"formula code\"><span class=\"math-main\">s<sub>token</sub>(i) = <span class=\"frac\"><span>1</span><span>m</span></span> Σ<sub>a=1</sub><sup>m</sup> best(t<sub>a</sub>, T<sub>i</sub>)</span><span class=\"math-main\">best(t<sub>a</sub>, T<sub>i</sub>) = max<sub>b</sub> cos(e(t<sub>a</sub>), e(c<sub>b</sub>))</span><span class=\"math-note\">Average each query token's best candidate-token match</span></div></article>\n      </div>\n      <span class=\"slide-no\">02</span><div class=\"footer\">ZHANG JINYU <span>/ AIT2509057</span></div>\n    </section>\n    <section class=\"slide fusion\" data-title=\"Three-way Score Fusion\" aria-hidden=\"true\" tabindex=\"-1\">\n      <div class=\"fusion-copy\"><p class=\"kicker reveal\">02 · Fuse by rank</p><h2 class=\"reveal d2\">Three-way Score Fusion</h2><p class=\"lead reveal d3\">retrieval.py uses Reciprocal Rank Fusion, so each method votes by ranking instead of contributing raw scores on incompatible scales.</p><div class=\"callout reveal d4\">If one FAQ stays near the top in semantic, lexical, and token rankings, it receives a high final score.</div></div>\n      <div class=\"rank-board reveal d3\" role=\"img\" aria-label=\"Example of three retrieval rankings contributing to final RRF score\">\n        <div class=\"rank-row\"><b>Semantic</b><div class=\"bar-track\"><div class=\"bar\" style=\"width: 87%\"></div></div><span>rank 2</span></div>\n        <div class=\"rank-row\"><b>Lexical</b><div class=\"bar-track\"><div class=\"bar\" style=\"width: 74%\"></div></div><span>rank 5</span></div>\n        <div class=\"rank-row\"><b>Token</b><div class=\"bar-track\"><div class=\"bar\" style=\"width: 92%\"></div></div><span>rank 1</span></div>\n        <div class=\"rrf-formula code\">\n          <div class=\"formula-line\"><span class=\"label\">raw</span><span class=\"expr compact\">RRF<sub>raw</sub>(i) = <span class=\"frac\"><span>1</span><span>K + r<sub>embed</sub>(i)</span></span> + <span class=\"frac\"><span>1</span><span>K + r<sub>tfidf</sub>(i)</span></span> + <span class=\"frac\"><span>1</span><span>K + r<sub>token</sub>(i)</span></span></span></div>\n          <div class=\"formula-line\"><span class=\"label\">normalize</span><span class=\"expr\">RRF(i) = <span class=\"frac\"><span>RRF<sub>raw</sub>(i)</span><span>3 / (K + 1)</span></span></span></div>\n          <div class=\"formula-line\"><span class=\"label\">constant</span><span class=\"expr\">K = 60</span></div>\n        </div>\n        <p class=\"mini-label\">The normalized score is clipped to [0, 1].</p>\n      </div>\n      <span class=\"slide-no\">03</span><div class=\"footer\">ZHANG JINYU <span>/ AIT2509057</span></div>\n    </section>\n    <section class=\"slide tie\" data-title=\"Keyword Tie-breaker\" aria-hidden=\"true\" tabindex=\"-1\">\n      <header><p class=\"kicker reveal\">03 · Resolve close calls</p><h2 class=\"slide-title reveal d2\">Keyword Tie-breaker</h2></header>\n      <div class=\"tie-layout\">\n        <div class=\"keyword-card reveal d3\"><p class=\"mini-label\">Auxiliary, not primary</p><h3>Use the most distinctive query token only when RRF scores are close.</h3><p>The system selects the highest-IDF non-stopword token, embeds it, and compares it with candidate tokens.</p></div>\n        <div class=\"bucket reveal d4\">\n          <div class=\"bucket-row formula-step\"><strong>1</strong><p class=\"code\"><span class=\"expr\">k = argmax<sub>t ∈ T<sub>q</sub></sub> IDF(t)</span><span class=\"desc\">Choose the most distinctive query token.</span></p><span>keyword</span></div>\n          <div class=\"bucket-row formula-step\"><strong>2</strong><p class=\"code\"><span class=\"expr\">s<sub>keyword</sub>(i) = max<sub>c ∈ T<sub>i</sub></sub> cos(e(k), e(c))</span><span class=\"desc\">Compare that token with candidate tokens.</span></p><span>semantic match</span></div>\n          <div class=\"bucket-row formula-step\"><strong>3</strong><p class=\"code\"><span class=\"expr\">bucket(i) = round(RRF(i) / ε)</span><span class=\"desc\">ε = 0.01 groups candidates with near-equal RRF scores.</span></p><span>close score</span></div>\n          <div class=\"bucket-row formula-step\"><strong>4</strong><p><span class=\"expr\">bucket → s<sub>keyword</sub> → RRF</span><span class=\"desc\">Keyword similarity only breaks ties inside the close-score bucket.</span></p><span>final order</span></div>\n        </div>\n      </div>\n      <span class=\"slide-no\">04</span><div class=\"footer\">ZHANG JINYU <span>/ AIT2509057</span></div>\n    </section>\n    <section class=\"slide fallback\" data-title=\"Fallback Logic\" aria-hidden=\"true\" tabindex=\"-1\">\n      <div class=\"fusion-copy\"><p class=\"kicker reveal\">04 · Refuse weak evidence</p><h2 class=\"reveal d2\">Fallback Logic</h2><p class=\"lead reveal d3\">The retriever does not force an FAQ answer when the evidence is too thin.</p><blockquote class=\"fallback-reply reveal d4\">“Sorry, I do not have an answer for that.”</blockquote></div>\n      <div class=\"guard-list reveal d3\" aria-label=\"Fallback conditions in retrieval.py\">\n        <div class=\"guard\"><b>01</b><p>No lexical anchor <span>from important keyword or TF-IDF overlap</span></p></div>\n        <div class=\"guard\"><b>02</b><p>Final RRF score is too low <span>below 0.2</span></p></div>\n        <div class=\"guard\"><b>03</b><p>Evidence score is too low <span>below 0.25</span></p></div>\n        <div class=\"guard\"><b>04</b><p>Fallback protects users <span>from confident but unsupported answers</span></p></div>\n      </div>\n      <span class=\"slide-no\">05</span><div class=\"footer\">ZHANG JINYU <span>/ AIT2509057</span></div>\n    </section>\n    <section class=\"slide eval\" data-title=\"Retrieval Evaluation on Extended Query Set\" aria-hidden=\"true\" tabindex=\"-1\">\n      <header class=\"eval-head\"><div><p class=\"kicker reveal\">05 · Test results</p><h2 class=\"slide-title reveal d2\">Retrieval Evaluation on Extended Query Set</h2></div><p class=\"eval-source reveal d3\">Test set: <span class=\"code\">data/train&amp;test/extend_data.jsonl</span>. Each FAQ id has four query variants: standard, colloquial, incomplete, and paraphrase. Top-4 counts the first hit or related questions.</p></header>\n      <table class=\"reveal d3\" aria-label=\"Retrieval evaluation metrics by query type\"><thead><tr><th>Query type</th><th>N</th><th>Top-1 Accuracy</th><th>Top-4 Recall</th><th>Fallback Rate</th><th>Average Score</th></tr></thead><tbody><tr><td>Overall</td><td>2460</td><td>0.741</td><td>0.910</td><td>0.010</td><td>0.984</td></tr><tr><td>Standard</td><td>615</td><td>0.964</td><td>0.989</td><td>0.005</td><td>0.998</td></tr><tr><td>Colloquial</td><td>615</td><td>0.567</td><td>0.826</td><td>0.021</td><td>0.972</td></tr><tr><td>Incomplete</td><td>615</td><td>0.725</td><td>0.938</td><td>0.007</td><td>0.981</td></tr><tr><td>Paraphrase</td><td>615</td><td>0.709</td><td>0.886</td><td>0.007</td><td>0.985</td></tr></tbody></table>\n      <p class=\"insight reveal d4\">The system performs very well on standard questions, but colloquial queries are much harder. Since Top-4 is much higher than Top-1, many correct answers are already retrieved but not ranked first, suggesting that ranking refinement is the main improvement direction.</p>\n      <span class=\"slide-no\">06</span><div class=\"footer\">ZHANG JINYU <span>/ AIT2509057</span></div>\n    </section>\n    <section class=\"slide case\" data-title=\"Case Study: English Classes\" aria-hidden=\"true\" tabindex=\"-1\">\n      <div><p class=\"kicker reveal\">06 · Case study</p><h2 class=\"reveal d2\">The “English classes” error</h2><p class=\"lead reveal d3\">A short query can contain a broad lexical anchor without enough context to separate similar FAQ intents.</p></div>\n      <div class=\"case-card reveal d3\"><span class=\"query-pill code\">Query: English classes</span><div class=\"score-badge\">0.968<span>score</span></div><div class=\"case-grid\"><div class=\"answer-box expected\"><span class=\"id\">Expected · AA_015</span><p>What should I do if I can't understand the English-only instruction at the beginning? Any adaptation tips?</p></div><div class=\"answer-box retrieved\"><span class=\"id\">Retrieved · AA_017</span><p>What are the English language requirements for international students applying to foundation programmes?</p></div></div><p class=\"error-note\">The short query only contains a broad lexical anchor, “English”. The retriever confuses English-medium class adaptation with English language requirements because both candidates share semantically similar terms but refer to different student needs.</p></div>\n      <span class=\"slide-no\">07</span><div class=\"footer\">ZHANG JINYU <span>/ AIT2509057</span></div>\n    </section>\n    <button class=\"nav-zone prev\" type=\"button\" aria-label=\"Previous slide\"></button>\n    <button class=\"nav-zone next\" type=\"button\" aria-label=\"Next slide\"></button>\n    <div class=\"progress\" aria-hidden=\"true\"><span></span></div>\n    <div class=\"counter\" aria-live=\"polite\"></div>\n  </main>\n  </div>\n  <script>\n    (() => {\n      const deck = document.querySelector('.deck');\n      const stage = document.querySelector('.stage');\n      const slides = [...document.querySelectorAll('.slide')];\n      const counter = document.querySelector('.counter');\n      const progress = document.querySelector('.progress > span');\n      const prevButton = document.querySelector('.nav-zone.prev');\n      const nextButton = document.querySelector('.nav-zone.next');\n      let index = Math.max(0, Math.min(slides.length - 1, 0));\n      let touchStartX = null;\n      function resizeStage() { const scale = Math.min(stage.clientWidth / 1600, stage.clientHeight / 900); deck.style.setProperty('--deck-scale', String(scale)); }\n      const isEditing = (target) => target instanceof Element && Boolean(target.closest('input, textarea, select, button:not(.nav-zone), [contenteditable=\"true\"]'));\n      function render(nextIndex, updateHash = true) {\n        index = Math.max(0, Math.min(slides.length - 1, nextIndex));\n        slides.forEach((slide, slideIndex) => {\n          const active = slideIndex === index;\n          slide.classList.toggle('is-active', active);\n          slide.setAttribute('aria-hidden', String(!active));\n        });\n        counter.textContent = `${String(index + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;\n        progress.style.width = `${((index + 1) / slides.length) * 100}%`;\n        const title = slides[index]?.dataset.title;\n        document.title = title ? `${title} — Retrieval-based Chatbot` : 'Retrieval-based Chatbot';\n        \n        slides[index]?.focus({ preventScroll: true });\n      }\n      function enterFullscreen() { if (!document.fullscreenElement) deck.requestFullscreen?.().catch(() => {}); else document.exitFullscreen?.().catch(() => {}); }\n      function goForward() { render(index + 1); }\n      function goBack() { render(index - 1); }\n      document.addEventListener('keydown', (event) => {\n        if (isEditing(event.target)) return;\n        const nextKeys = ['ArrowRight', 'ArrowDown', 'PageDown', ' '];\n        const prevKeys = ['ArrowLeft', 'ArrowUp', 'PageUp'];\n        if (nextKeys.includes(event.key)) { event.preventDefault(); goForward(); }\n        else if (prevKeys.includes(event.key)) { event.preventDefault(); goBack(); }\n        else if (event.key === 'Home') { event.preventDefault(); render(0); }\n        else if (event.key === 'End') { event.preventDefault(); render(slides.length - 1); }\n        else if (event.key.toLowerCase() === 'f') { event.preventDefault(); enterFullscreen(); }\n      });\n      prevButton.addEventListener('click', () => goBack());\n      nextButton.addEventListener('click', () => goForward());\n      deck.addEventListener('click', (event) => { if (isEditing(event.target) || event.target.closest('.nav-zone')) return; goForward(); });\n      \n      deck.addEventListener('touchstart', (event) => { touchStartX = event.changedTouches[0]?.clientX ?? null; }, { passive: true });\n      deck.addEventListener('touchend', (event) => {\n        if (touchStartX === null) return;\n        const distance = (event.changedTouches[0]?.clientX ?? touchStartX) - touchStartX;\n        touchStartX = null;\n        if (Math.abs(distance) < 48) return;\n        if (distance < 0) goForward();\n        else goBack();\n      }, { passive: true });\n      window.addEventListener('resize', resizeStage);\n      resizeStage();\n      render(index, false);\n    })();\n  <\/script>\n\n<style id=\"master-deck-overrides\">\n  .counter, .progress, .nav-zone, .nav-arrow, .slide-no, .slide-index { display: none !important; }\n</style>\n<script>\n(() => {\n  const deckId = \"zjy\";\n  const slides = [...document.querySelectorAll('.slide')];\n  const setSlide = (nextIndex) => {\n    const index = Math.max(0, Math.min(slides.length - 1, Number(nextIndex) || 0));\n    slides.forEach((slide, slideIndex) => {\n      const active = slideIndex === index;\n      slide.classList.toggle('is-active', active);\n      slide.classList.toggle('was-before', slideIndex < index);\n      slide.setAttribute('aria-hidden', String(!active));\n    });\n    window.__novaSyncIndex?.(index);\n    slides[index]?.focus({ preventScroll: true });\n  };\n  addEventListener('message', event => {\n    if (event.data?.type === 'nova-set-slide') setSlide(event.data.index);\n    else if (event.data?.type === 'nova-local-command') window.__novaLocalCommand?.(event.data.command);\n  });\n  document.addEventListener('keydown', event => {\n    const target = event.target;\n    if (target instanceof Element && target.closest('input, textarea, select, [contenteditable=\"true\"]')) return;\n    const commands = {\n      ArrowRight: 'next', ArrowDown: 'next', PageDown: 'next', ' ': 'next',\n      ArrowLeft: 'prev', ArrowUp: 'prev', PageUp: 'prev',\n      Home: 'home', End: 'end', f: 'fullscreen', F: 'fullscreen'\n    };\n    const command = commands[event.key];\n    if (!command) return;\n    const localInteractive = deckId === 'cmh' && document.querySelector('.preprocess.is-active');\n    if (localInteractive && (command === 'next' || command === 'prev')) return;\n    event.preventDefault();\n    event.stopImmediatePropagation();\n    parent.postMessage({ type: 'nova-command', command }, '*');\n  }, true);\n  document.addEventListener('click', event => {\n    const target = event.target;\n    if (target instanceof Element && target.closest('a, button, input, textarea, select, [contenteditable=\"true\"]')) return;\n    if (deckId === 'cmh' && document.querySelector('.preprocess.is-active')) return;\n    event.preventDefault();\n    event.stopImmediatePropagation();\n    parent.postMessage({ type: 'nova-command', command: 'next' }, '*');\n  }, true);\n})();\n<\/script>\n</body>\n</html>\n"},{"id":"szs","slideCount":6,"html":"<!doctype html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <meta name=\"color-scheme\" content=\"light\">\n  <meta name=\"theme-color\" content=\"#f4efe5\">\n  <title>Nova — XMUM Freshman FAQ Chatbot</title>\n  <style>\n    :root {\n      --navy: #1f2a52;\n      --navy-2: #314372;\n      --navy-3: #111a38;\n      --gold: #d6a93f;\n      --gold-soft: #f7e8bc;\n      --emerald: #2f9e5e;\n      --blue: #3972d5;\n      --paper: #f8fafc;\n      --white: #ffffff;\n      --slate: #64748b;\n      --ink: #172033;\n      --line: rgba(31, 42, 82, .12);\n      --glass: rgba(255, 255, 255, .76);\n      --ease: cubic-bezier(.22, .8, .22, 1);\n      --pad-x: 104px;\n      --pad-y: 76px;\n    }\n\n    * { box-sizing: border-box; }\n    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }\n    body {\n      display: grid;\n      place-items: center;\n      background: #0d1327;\n      color: var(--ink);\n      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n      -webkit-font-smoothing: antialiased;\n    }\n    button, a { font: inherit; }\n    h1, h2, h3, p { margin: 0; }\n    svg { display: block; }\n\n    .stage {\n      position: relative;\n      width: min(100vw, calc(100vh * 16 / 9));\n      height: min(100vh, calc(100vw * 9 / 16));\n      aspect-ratio: 16 / 9;\n      overflow: hidden;\n      background: var(--paper);\n      box-shadow: 0 36px 120px rgba(0, 0, 0, .48);\n    }\n    .deck {\n      position: absolute;\n      inset: 0 auto auto 0;\n      width: 1600px;\n      height: 900px;\n      transform: scale(var(--deck-scale, 1));\n      transform-origin: top left;\n      overflow: hidden;\n      isolation: isolate;\n    }\n    .slide {\n      position: absolute;\n      inset: 0;\n      padding: var(--pad-y) var(--pad-x);\n      visibility: hidden;\n      opacity: 0;\n      transform: translate3d(100%, 0, 0);\n      transition: transform 650ms var(--ease), opacity 420ms ease, visibility 0s linear 650ms;\n      overflow: hidden;\n      background:\n        radial-gradient(circle at 87% 12%, rgba(214, 169, 63, .12), transparent 20%),\n        radial-gradient(circle at 8% 92%, rgba(57, 114, 213, .08), transparent 26%),\n        var(--paper);\n    }\n    .slide::before {\n      content: \"\";\n      position: absolute;\n      inset: 0;\n      pointer-events: none;\n      opacity: .38;\n      background-image: radial-gradient(rgba(31,42,82,.16) .8px, transparent .8px);\n      background-size: 22px 22px;\n      mask-image: linear-gradient(90deg, #000, transparent 42%, transparent 70%, #000);\n    }\n    .slide.was-before { transform: translate3d(-100%, 0, 0); }\n    .slide.is-active {\n      z-index: 2;\n      visibility: visible;\n      opacity: 1;\n      transform: translate3d(0, 0, 0);\n      transition-delay: 0s;\n    }\n    .slide.is-active .reveal { animation: rise .55s var(--ease) both; }\n    .slide.is-active .d2 { animation-delay: 90ms; }\n    .slide.is-active .d3 { animation-delay: 180ms; }\n    .slide.is-active .d4 { animation-delay: 270ms; }\n    @keyframes rise { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: none; } }\n\n    .eyebrow {\n      display: inline-flex;\n      align-items: center;\n      gap: 10px;\n      color: var(--navy);\n      font-size: 14px;\n      font-weight: 850;\n      letter-spacing: .17em;\n      text-transform: uppercase;\n    }\n    .eyebrow::before { content: \"\"; width: 30px; height: 3px; border-radius: 2px; background: var(--gold); }\n    .slide-title { margin-top: 18px; color: var(--navy); font-size: 66px; line-height: .98; letter-spacing: -.055em; }\n    .gold-rule { width: 92px; height: 6px; margin-top: 26px; border-radius: 999px; background: var(--gold); }\n    .slide-index {\n      position: absolute;\n      z-index: 3;\n      top: 77px;\n      right: 105px;\n      color: rgba(31,42,82,.24);\n      font: 700 14px/1 ui-monospace, SFMono-Regular, Menlo, monospace;\n      letter-spacing: .14em;\n    }\n    .deck-mark {\n      position: absolute;\n      z-index: 3;\n      left: 104px;\n      bottom: 37px;\n      display: flex;\n      align-items: center;\n      gap: 10px;\n      color: rgba(31,42,82,.58);\n      font-size: 11px;\n      font-weight: 800;\n      letter-spacing: .16em;\n      text-transform: uppercase;\n    }\n    .deck-mark::before { content: \"\"; width: 7px; height: 7px; border-radius: 2px; background: var(--gold); transform: rotate(45deg); }\n    .glass {\n      border: 1px solid rgba(255,255,255,.82);\n      background: var(--glass);\n      box-shadow: 0 24px 70px rgba(31,42,82,.12), inset 0 0 0 1px rgba(31,42,82,.05);\n      backdrop-filter: blur(16px);\n    }\n\n    /* 01 — Hook */\n    .cover { display: grid; place-items: center; text-align: center; background: var(--paper); }\n    .cover::before { opacity: .5; mask-image: radial-gradient(circle at center, #000, transparent 70%); }\n    .nova-watermark {\n      position: absolute;\n      left: 50%;\n      top: 49%;\n      transform: translate(-50%, -50%);\n      color: rgba(31,42,82,.045);\n      font-size: 285px;\n      font-weight: 950;\n      line-height: 1;\n      letter-spacing: .12em;\n      white-space: nowrap;\n      pointer-events: none;\n    }\n    .cover-orbit { position: absolute; width: 780px; height: 780px; border: 1px solid rgba(31,42,82,.08); border-radius: 50%; }\n    .cover-orbit::before, .cover-orbit::after { content: \"\"; position: absolute; border-radius: 50%; background: var(--gold); box-shadow: 0 0 0 10px rgba(214,169,63,.1); }\n    .cover-orbit::before { width: 12px; height: 12px; top: 135px; right: 100px; }\n    .cover-orbit::after { width: 8px; height: 8px; left: 64px; bottom: 180px; background: var(--blue); }\n    .cover-card {\n      position: relative;\n      z-index: 1;\n      width: 1040px;\n      min-height: 560px;\n      display: grid;\n      place-content: center;\n      padding: 70px 110px 62px;\n      border-radius: 36px;\n    }\n    .project-pill {\n      justify-self: center;\n      padding: 10px 19px;\n      border-radius: 999px;\n      background: var(--gold);\n      color: var(--navy-3);\n      font-size: 12px;\n      font-weight: 900;\n      letter-spacing: .18em;\n      text-transform: uppercase;\n      box-shadow: 0 10px 24px rgba(214,169,63,.28);\n    }\n    .cover h1 {\n      margin: 30px auto 23px;\n      max-width: 13ch;\n      background: linear-gradient(120deg, var(--navy-3), var(--navy-2) 58%, #6981b4);\n      -webkit-background-clip: text;\n      background-clip: text;\n      color: transparent;\n      font-size: 82px;\n      line-height: .98;\n      letter-spacing: -.058em;\n    }\n    .nova-line { display: flex; justify-content: center; align-items: center; gap: 13px; color: var(--slate); font-size: 19px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; }\n    .bot-icon { display: grid; place-items: center; width: 42px; height: 42px; border-radius: 13px; background: var(--navy); color: var(--gold); box-shadow: 0 9px 20px rgba(31,42,82,.22); }\n\n    /* 02 — Visual identity */\n    .identity { display: grid; grid-template-columns: .72fr 1.28fr; gap: 86px; align-items: center; }\n    .identity-copy { position: relative; z-index: 1; padding-bottom: 42px; }\n    .identity-copy h2 { max-width: 7ch; font-size: 78px; }\n    .identity-copy p:last-child { margin-top: 34px; max-width: 25ch; color: var(--slate); font-size: 19px; line-height: 1.55; }\n    .identity-grid { position: relative; z-index: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 282px 282px; gap: 20px; }\n    .identity-card { position: relative; padding: 32px; border: 1px solid var(--line); border-radius: 25px; overflow: hidden; background: rgba(255,255,255,.84); box-shadow: 0 18px 48px rgba(31,42,82,.1); }\n    .identity-card h3 { font-size: 22px; color: var(--navy); letter-spacing: -.02em; }\n    .identity-card p { margin-top: 6px; color: var(--slate); font-size: 13px; }\n    .palette-card { grid-row: 1 / span 2; background: var(--navy); color: white; border-color: transparent; }\n    .palette-card h3 { color: white; }\n    .palette-card p { color: rgba(255,255,255,.62); }\n    .swatches { position: absolute; left: 32px; right: 32px; bottom: 36px; display: grid; gap: 12px; }\n    .swatch { height: 78px; display: flex; align-items: flex-end; justify-content: space-between; padding: 16px; border-radius: 18px; font-size: 11px; font-weight: 800; letter-spacing: .08em; }\n    .swatch.navy { background: #101a3b; color: white; border: 1px solid rgba(255,255,255,.16); }\n    .swatch.gold { width: 82%; background: var(--gold); color: var(--navy-3); }\n    .swatch.green { width: 63%; background: var(--emerald); color: white; }\n    .wireframe { position: absolute; right: 10px; bottom: -16px; width: 225px; height: 160px; opacity: .9; }\n    .ruler-visual { position: absolute; right: 25px; bottom: 22px; width: 225px; height: 110px; }\n\n    /* 03 — Explainable AI */\n    .xai { display: grid; grid-template-columns: .82fr 1.18fr; align-items: center; gap: 70px; }\n    .xai::before { opacity: .75; background-image: linear-gradient(rgba(31,42,82,.055) 1px, transparent 1px), linear-gradient(90deg, rgba(31,42,82,.055) 1px, transparent 1px); background-size: 34px 34px; mask-image: none; }\n    .xai-copy, .xai-dashboard { position: relative; z-index: 1; }\n    .xai-copy h2 { max-width: 9ch; font-size: 76px; }\n    .feature-chips { display: grid; gap: 14px; margin-top: 46px; width: 360px; }\n    .feature-chip { display: flex; align-items: center; gap: 13px; width: max-content; min-width: 255px; padding: 13px 17px 13px 13px; border: 1px solid rgba(31,42,82,.13); border-radius: 999px; background: rgba(255,255,255,.84); color: var(--navy); font-size: 14px; font-weight: 750; box-shadow: 0 10px 26px rgba(31,42,82,.07); }\n    .chip-icon { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 50%; background: var(--gold-soft); color: var(--navy); font-size: 11px; font-weight: 900; }\n    .xai-dashboard { min-height: 600px; padding: 32px; border-radius: 30px; }\n    .dash-top { display: flex; align-items: center; justify-content: space-between; }\n    .dash-title { color: var(--navy); font-size: 14px; font-weight: 850; letter-spacing: .1em; text-transform: uppercase; }\n    .live-pill { display: flex; align-items: center; gap: 7px; padding: 7px 11px; border-radius: 999px; background: rgba(47,158,94,.1); color: var(--emerald); font-size: 11px; font-weight: 850; }\n    .live-pill::before { content: \"\"; width: 7px; height: 7px; border-radius: 50%; background: currentColor; box-shadow: 0 0 0 5px rgba(47,158,94,.1); }\n    .confidence-layout { display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 32px; margin-top: 40px; }\n    .confidence-ring { position: relative; width: 258px; height: 258px; display: grid; place-items: center; }\n    .confidence-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }\n    .confidence-ring > div { position: relative; z-index: 1; display: grid; place-items: center; }\n    .confidence-ring circle { fill: none; stroke-width: 16; }\n    .confidence-ring .track { stroke: #e5ebf2; }\n    .confidence-ring .meter { stroke: var(--emerald); stroke-linecap: round; stroke-dasharray: 691; stroke-dashoffset: 34.55; filter: drop-shadow(0 5px 8px rgba(47,158,94,.25)); }\n    .confidence-ring strong { color: var(--emerald); font-size: 76px; line-height: 1; letter-spacing: -.06em; }\n    .confidence-ring span { margin-top: 5px; color: var(--slate); font-size: 11px; font-weight: 800; letter-spacing: .11em; text-transform: uppercase; }\n    .score-copy h3 { color: var(--navy); font-size: 29px; line-height: 1.1; letter-spacing: -.03em; }\n    .score-copy p { margin-top: 13px; color: var(--slate); font-size: 15px; line-height: 1.5; }\n    .meta-rows { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 40px; }\n    .meta-card { padding: 18px 17px; border: 1px solid var(--line); border-radius: 16px; background: rgba(248,250,252,.86); }\n    .meta-card b { display: block; color: var(--navy); font-size: 17px; }\n    .meta-card span { display: block; margin-top: 5px; color: var(--slate); font-size: 10px; font-weight: 750; letter-spacing: .08em; text-transform: uppercase; }\n\n    /* 04 — Architecture */\n    .architecture { display: grid; grid-template-rows: auto 1fr; }\n    .architecture .slide-title { max-width: 13ch; }\n    .architecture-body { position: relative; z-index: 1; display: grid; grid-template-columns: 1.25fr .75fr; gap: 42px; align-items: center; margin-top: 46px; padding-bottom: 38px; }\n    .flow-map { position: relative; display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; align-items: stretch; }\n    .flow-map::before { content: \"\"; position: absolute; z-index: -1; left: 15%; right: 15%; top: 78px; height: 3px; background: linear-gradient(90deg, var(--gold), var(--blue), var(--emerald)); }\n    .flow-node { position: relative; min-height: 310px; padding: 28px 25px; border: 1px solid var(--line); border-radius: 23px; background: rgba(255,255,255,.94); box-shadow: 0 18px 44px rgba(31,42,82,.09); }\n    .node-icon { position: relative; display: grid; place-items: center; width: 78px; height: 78px; margin: 10px auto 28px; border: 8px solid var(--paper); border-radius: 22px; background: var(--navy); color: white; box-shadow: 0 0 0 1px var(--line), 0 12px 22px rgba(31,42,82,.18); }\n    .flow-node:nth-child(2) .node-icon { background: var(--blue); }\n    .flow-node:nth-child(3) .node-icon { background: var(--emerald); }\n    .flow-node h3 { color: var(--navy); font-size: 21px; line-height: 1.2; text-align: center; }\n    .flow-node p { margin-top: 13px; color: var(--slate); font-size: 13px; line-height: 1.45; text-align: center; }\n    .flow-arrow { position: absolute; z-index: 4; top: 64px; right: -21px; display: grid; place-items: center; width: 28px; height: 28px; border-radius: 50%; background: white; color: var(--navy); box-shadow: 0 5px 16px rgba(31,42,82,.18); }\n    .load-card { position: relative; min-height: 340px; display: grid; place-content: center; text-align: center; border-radius: 28px; overflow: hidden; background: linear-gradient(145deg, #111a38, #263667); color: white; box-shadow: 0 24px 60px rgba(17,26,56,.3); }\n    .load-card::before { content: \"\"; position: absolute; width: 230px; height: 230px; right: -60px; top: -70px; border-radius: 50%; background: rgba(214,169,63,.14); filter: blur(4px); }\n    .bolt { justify-self: center; display: grid; place-items: center; width: 64px; height: 64px; border-radius: 20px; background: rgba(214,169,63,.15); color: var(--gold); box-shadow: 0 0 34px rgba(214,169,63,.18); }\n    .load-card strong { margin-top: 25px; color: white; font-size: 82px; line-height: .9; letter-spacing: -.07em; }\n    .load-card strong em { color: var(--gold); font-style: normal; }\n    .load-card p { margin-top: 15px; color: rgba(255,255,255,.62); font-size: 12px; font-weight: 850; letter-spacing: .17em; text-transform: uppercase; }\n    .plug { margin-top: 26px; justify-self: center; padding: 9px 14px; border: 1px solid rgba(255,255,255,.16); border-radius: 999px; color: rgba(255,255,255,.76); font-size: 10px; font-weight: 800; letter-spacing: .12em; }\n\n    /* 05 — UX Details */\n    .ux { display: grid; grid-template-rows: auto 1fr; }\n    .ux-grid { position: relative; z-index: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin ve; width: 54px; height: 82px; border: 3px solid var(--navy); border-radius: 28px; background: white; }\n    .mouse-shell::after { content: \"\"; position: absolute; left: 50%; top: 14px; width: 5px; height: 17px; margin-left: -2.5px; border-radius: 4px; background: var(--emerald); animation: scroll 1.5s var(--ease) infinite; }\n    @keyframes scroll { 0% { transform: translateY(-3px); opacity: 0; } 40% { opacity: 1; } 100% { transform: translateY(18px); opacity: 0; } }\n    .interaction-tag { position: absolute; left: 30px; bottom: 26px; color: rgba(31,42,82,.42); font-size: 10px; font-weight: 850; letter-spacing: .15em; text-transform: uppercase; }\n\n    /* 06 — CTA */\n    .cta { display: grid; place-items: center; text-align: center; color: white; background: #f8fafc; }\n    .cta::before { opacity: 1; background: radial-gradient(circle at 50% 45%, rgba(49,67,114,.98), var(--navy-3) 51%, #0c132b 78%); mask-image: none; }\n    .cta::after { content: none; }\n    .cta-inner { position: relative; z-index: 2; display: grid; justify-items: center; }\n    .chat-bubble {\n      position: relative;\n      display: grid;\n      place-items: center;\n      width: 108px;\n      height: 90px;\n      border-radius: 28px;\n      background: white;\n      color: var(--navy);\n      box-shadow: 0 18px 50px rgba(0,0,0,.25), 0 0 0 12px rgba(255,255,255,.06);\n    }\n    .chat-bubble::after { content: \"\"; position: absolute; right: 15px; bottom: -13px; width: 28px; height: 30px; background: white; clip-path: polygon(0 0, 100% 0, 100% 100%); }\n    .cta h2 { margin-top: 36px; max-width: 12ch; color: white; font-size: 92px; line-height: .95; letter-spacing: -.06em; }\n    .cta-sub { margin-top: 18px; color: rgba(255,255,255,.62); font-size: 16px; }\n    .demo-button { margin-top: 34px; padding: 17px 31px; border: 0; border-radius: 15px; background: var(--gold); color: var(--navy-3); font-size: 15px; font-weight: 900; letter-spacing: .04em; box-shadow: 0 12px 38px rgba(214,169,63,. n><div><h3>Confidence Filtering</h3><p>High vs low confidence</p></div></div>\n          <div class=\"radial-node node-fallback\"><span class=\"icon blue\">F</span><div><h3>Fallback Strategy</h3><p>Related questions suggestion</p></div></div>\n        </div>\n        <div class=\"impact-flow reveal d4\" aria-label=\"Impact flow from accuracy to user experience\">\n          <div class=\"impact-item\">Accuracy</div>\n          <div class=\"impact-item\">Reliability</div>\n          <div class=\"impact-item\">Trust</div>\n          <div class=\"impact-item\">User Experience</div>\n        </div>\n        <div class=\"finding-box reveal d4\">\n          <strong>Key Finding</strong>\n          <p>Hybrid design improves stability + response quality</p>\n        </div>\n        <span class=\"slide-no\">02</span>\n        <div class=\"footer\">HUANG XINYI <span>/ AIT2509022</span></div>\n      </section>\n\n      <section class=\"slide limitations\" data-title=\"Limitation System Constraints\" aria-hidden=\"true\" tabindex=\"-1\">\n        <header>\n          <p class=\"kicker reveal\">Limitation</p>\n          <h2 class=\"slide-title reveal d2\">Current System Constraints</h2>\n        </header>\n        <div class=\"mindmap reveal d3\" role=\"img\" aria-label=\"Mind map of system limitations including dataset dependency, language variability, static knowledge, and domain restriction\">\n          <svg class=\"mind-connectors\" viewBox=\"0 0 1416 492\" aria-hidden=\"true\" preserveAspectRatio=\"none\">\n            <line x1=\"488\" y1=\"109\" x2=\"592\" y2=\"194\"></line>\n            <line x1=\"928\" y1=\"109\" x2=\"824\" y2=\"194\"></line>\n            <line x1=\"488\" y1=\"372\" x2=\"592\" y2=\"298\"></line>\n            <line x1=\"928\" y1=\"372\" x2=\"824\" y2=\"298\"></line>\n          </svg>\n          <div class=\"mind-center\"><h3>System Limitations</h3></div>\n          <div class=\"mind-branch branch-data\"><span class=\"tag\">Data</span><h3>Dataset Dependency</h3><p>Limited FAQ / data quality / coverage</p></div>\n          <div class=\"mind-branch branch-language\"><span class=\"tag\">Language</span><h3>Language Variability</h3><p>Slang / informal / ambiguity issues</p></div>\n          <div class=\"mind-branch branch-static\"><span class=\"tag\">Maintenance</span><h3>Static Knowledge</h3><p>No auto-learning / manual updates</p></div>\n          <div class=\"mind-branch branch-domain\"><span class=\"tag\">Scope</span><h3>Domain Restriction</h3><p>XMUM-specific / weak generalization</p></div>\n        </div>\n        <div class=\"warning-box reveal d4\">\n          <strong>Key Observation</strong>\n          <p>Limitations = Data + Maintenance issues, not architecture</p>\n        </div>\n        <span class=\"slide-no\">03</span>\n        <div class=\"footer\">HUANG XINYI <span>/ AIT2509022</span></div>\n      </section>\n\n      <section class=\"slide conclusion\" data-title=\"Conclusion Future Improvement\" aria-hidden=\"true\" tabindex=\"-1\">\n        <div class=\"circular-area\">\n          <header>\n            <p class=\"kicker reveal\">Conclusion</p>\n            <h2 class=\"slide-title reveal d2\">Summary & Future Direction</h2>\n          </header>\n          <div class=\"architecture-summary reveal d3\" role=\"img\" aria-label=\"Four architecture modules converge into a reliable FAQ assistant\">\n            <div class=\"summary-grid\">\n              <div class=\"summary-node\"><strong>Rule-Based Layer</strong><span>simple intents</span></div>\n              <div class=\"summary-node\"><strong>Intent Classification</strong><span>category routing</span></div>\n              <div class=\"summary-node\"><strong>Semantic Retrieval</strong><span>answer matching</span></div>\n              <div class=\"summary-node\"><strong>Confidence Control</strong><span>fallback guard</span></div>\n            </div>\n            <div class=\"summary-converge\">\n              <div class=\"assistant-result\"><span>-></span>Reliable FAQ Assistant</div>\n            </div>\n          </div>\n        </div>\n        <div class=\"roadmap-area\">\n          <p class=\"mini-label reveal\">Future Roadmap</p>\n          <div class=\"roadmap reveal d3\" aria-label=\"Future roadmap from unanswered query to system expansion\">\n            <div class=\"road-step\"><span class=\"icon terra\">1</span><p>Unanswered query</p></div>\n            <div class=\"road-step\"><span class=\"icon blue\">2</span><p>Log system</p></div>\n            <div class=\"road-step\"><span class=\"icon sage\">3</span><p>Admin review</p></div>\n            <div class=\"road-step\"><span class=\"icon saffron\">4</span><p>FAQ update</p></div>\n            <div class=\"road-step\"><span class=\"icon blue\">5</span><p>Knowledge base update</p></div>\n            <div class=\"road-step\"><span class=\"icon terra\">6</span><p>System expansion</p></div>\n          </div>\n          <div class=\"continuous-box reveal d4\">\n            <strong>Continuous Improvement</strong>\n            <p>Collect unanswered queries -> manual labeling -> knowledge expansion</p>\n          </div>\n        </div>\n        <div class=\"key-points reveal d4\">\n          <div class=\"key-point\">Freshman support</div>\n          <div class=\"key-point\">Info accessibility</div>\n          <div class=\"key-point\">Reliable responses</div>\n        </div>\n        <div class=\"takeaway-box reveal d4\">\n          <strong>Final Takeaway</strong>\n          <p>Hybrid architecture enables scalable, reliable, continuously improving university chatbot system</p>\n        </div>\n        <span class=\"slide-no\">04</span>\n        <div class=\"footer\">HUANG XINYI <span>/ AIT2509022</span></div>\n      </section>\n\n      <button class=\"nav-zone prev\" type=\"button\" aria-label=\"Previous slide\"></button>\n      <button class=\"nav-zone next\" type=\"button\" aria-label=\"Next slide\"></button>\n      <div class=\"progress\" aria-hidden=\"true\"><span></span></div>\n      <div class=\"counter\" aria-live=\"polite\"></div>\n    </main>\n  </div>\n\n  <script>\n    (() => {\n      const deck = document.querySelector('.deck');\n      const stage = document.querySelector('.stage');\n      const slides = [...document.querySelectorAll('.slide')];\n      const counter = document.querySelector('.counter');\n      const progress = document.querySelector('.progress > span');\n      const prevButton = document.querySelector('.nav-zone.prev');\n      const nextButton = document.querySelector('.nav-zone.next');\n      let index = Math.max(0, Math.min(slides.length - 1, 0));\n      let touchStartX = null;\n\n      function resizeStage() {\n        const scale = Math.min(stage.clientWidth / 1600, stage.clientHeight / 900);\n        deck.style.setProperty('--deck-scale', String(scale));\n      }\n\n      const isEditing = (target) => target instanceof Element && Boolean(target.closest('input, textarea, select, button:not(.nav-zone), [contenteditable=\"true\"]'));\n\n      function render(nextIndex, updateHash = true) {\n        index = Math.max(0, Math.min(slides.length - 1, nextIndex));\n        slides.forEach((slide, slideIndex) => {\n          const active = slideIndex === index;\n          slide.classList.toggle('is-active', active);\n          slide.setAttribute('aria-hidden', String(!active));\n        });\n        counter.textContent = `${String(index + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;\n        progress.style.width = `${((index + 1) / slides.length) * 100}%`;\n        const title = slides[index]?.dataset.title;\n        document.title = title ? `${title} — Hybrid Chatbot Evaluation` : 'Hybrid Chatbot Evaluation';\n        \n        slides[index]?.focus({ preventScroll: true });\n      }\n\n      function enterFullscreen() {\n        if (!document.fullscreenElement) deck.requestFullscreen?.().catch(() => {});\n        else document.exitFullscreen?.().catch(() => {});\n      }\n\n      function goForward() { render(index + 1); }\n      function goBack() { render(index - 1); }\n\n      document.addEventListener('keydown', (event) => {\n        if (isEditing(event.target)) return;\n        const nextKeys = ['ArrowRight', 'ArrowDown', 'PageDown', ' '];\n        const prevKeys = ['ArrowLeft', 'ArrowUp', 'PageUp'];\n        if (nextKeys.includes(event.key)) { event.preventDefault(); goForward(); }\n        else if (prevKeys.includes(event.key)) { event.preventDefault(); goBack(); }\n        else if (event.key === 'Home') { event.preventDefault(); render(0); }\n        else if (event.key === 'End') { event.preventDefault(); render(slides.length - 1); }\n        else if (event.key.toLowerCase() === 'f') { event.preventDefault(); enterFullscreen(); }\n      });\n\n      prevButton.addEventListener('click', () => goBack());\n      nextButton.addEventListener('click', () => goForward());\n      deck.addEventListener('click', (event) => {\n        if (isEditing(event.target) || event.target.closest('.nav-zone')) return;\n        goForward();\n      });\n      \n      deck.addEventListener('touchstart', (event) => { touchStartX = event.changedTouches[0]?.clientX ?? null; }, { passive: true });\n      deck.addEventListener('touchend', (event) => {\n        if (touchStartX === null) return;\n        const distance = (event.changedTouches[0]?.clientX ?? touchStartX) - touchStartX;\n        touchStartX = null;\n        if (Math.abs(distance) < 48) return;\n        if (distance < 0) goForward();\n        else goBack();\n      }, { passive: true });\n      window.addEventListener('resize', resizeStage);\n      resizeStage();\n      render(index, false);\n    })();\n  <\/script>\n\n<style id=\"master-deck-overrides\">\n  .counter, .progress, .nav-zone, .nav-arrow, .slide-no, .slide-index { display: none !important; }\n</style>\n<script>\n(() => {\n  const deckId = \"hxy\";\n  const slides = [...document.querySelectorAll('.slide')];\n  const setSlide = (nextIndex) => {\n    const index = Math.max(0, Math.min(slides.length - 1, Number(nextIndex) || 0));\n    slides.forEach((slide, slideIndex) => {\n      const active = slideIndex === index;\n      slide.classList.toggle('is-active', active);\n      slide.classList.toggle('was-before', slideIndex < index);\n      slide.setAttribute('aria-hidden', String(!active));\n    });\n    window.__novaSyncIndex?.(index);\n    slides[index]?.focus({ preventScroll: true });\n  };\n  addEventListener('message', event => {\n    if (event.data?.type === 'nova-set-slide') setSlide(event.data.index);\n    else if (event.data?.type === 'nova-local-command') window.__novaLocalCommand?.(event.data.command);\n  });\n  document.addEventListener('keydown', event => {\n    const target = event.target;\n    if (target instanceof Element && target.closest('input, textarea, select, [contenteditable=\"true\"]')) return;\n    const commands = {\n      ArrowRight: 'next', ArrowDown: 'next', PageDown: 'next', ' ': 'next',\n      ArrowLeft: 'prev', ArrowUp: 'prev', PageUp: 'prev',\n      Home: 'home', End: 'end', f: 'fullscreen', F: 'fullscreen'\n    };\n    const command = commands[event.key];\n    if (!command) return;\n    const localInteractive = deckId === 'cmh' && document.querySelector('.preprocess.is-active');\n    if (localInteractive && (command === 'next' || command === 'prev')) return;\n    event.preventDefault();\n    event.stopImmediatePropagation();\n    parent.postMessage({ type: 'nova-command', command }, '*');\n  }, true);\n  document.addEventListener('click', event => {\n    const target = event.target;\n    if (target instanceof Element && target.closest('a, button, input, textarea, select, [contenteditable=\"true\"]')) return;\n    if (deckId === 'cmh' && document.querySelector('.preprocess.is-active')) return;\n    event.preventDefault();\n    event.stopImmediatePropagation();\n    parent.postMessage({ type: 'nova-command', command: 'next' }, '*');\n  }, true);\n})();\n<\/script>\n</body>\n</html>\n"}];
      const stage = document.querySelector('.master-stage');
      const counter = document.querySelector('.master-counter');
      const progress = document.querySelector('.master-progress > span');
      const frames = new Map();
      const total = decks.reduce((sum, deck) => sum + deck.slideCount, 0);
      const locations = decks.flatMap((deck, deckIndex) =>
        Array.from({ length: deck.slideCount }, (_, localIndex) => ({ deckIndex, localIndex }))
      );
      let index = Math.max(0, Math.min(total - 1, Number(location.hash.slice(1)) - 1 || 0));
      let touchStartX = null;

      decks.forEach((deck, deckIndex) => {
        const frame = document.createElement('iframe');
        frame.className = 'deck-frame';
        frame.title = deck.id.toUpperCase() + ' presentation section';
        frame.setAttribute('allow', 'fullscreen');
        frame.srcdoc = deck.html;
        frame.addEventListener('load', () => {
          const current = locations[index];
          if (current.deckIndex === deckIndex) frame.contentWindow.postMessage({ type: 'nova-set-slide', index: current.localIndex }, '*');
        });
        frames.set(deck.id, frame);
        stage.append(frame);
      });
      document.querySelector('.loading')?.remove();

      function render(nextIndex, updateHash = true) {
        index = Math.max(0, Math.min(total - 1, nextIndex));
        const current = locations[index];
        decks.forEach((deck, deckIndex) => frames.get(deck.id).classList.toggle('is-active', deckIndex === current.deckIndex));
        const activeDeck = decks[current.deckIndex];
        frames.get(activeDeck.id).contentWindow?.postMessage({ type: 'nova-set-slide', index: current.localIndex }, '*');
        counter.textContent = String(index + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0');
        progress.style.width = (((index + 1) / total) * 100) + '%';
        document.title = activeDeck.id.toUpperCase() + ' · ' + (current.localIndex + 1) + '/' + activeDeck.slideCount + ' — Nova Complete Presentation';
        if (updateHash) history.replaceState(null, '', '#' + (index + 1));
      }

      function enterFullscreen() {
        if (!document.fullscreenElement) stage.requestFullscreen?.().catch(() => {});
        else document.exitFullscreen?.().catch(() => {});
      }

      function navigate(command) {
        const current = locations[index];
        const activeDeck = decks[current.deckIndex];
        if (activeDeck.id === 'cmh' && current.localIndex === 1 && (command === 'next' || command === 'prev')) {
          frames.get(activeDeck.id).contentWindow?.postMessage({ type: 'nova-local-command', command }, '*');
          return;
        }
        if (command === 'next') render(index + 1);
        else if (command === 'prev') render(index - 1);
      }

      document.addEventListener('keydown', event => {
        if (event.target instanceof Element && event.target.closest('input, textarea, select, [contenteditable="true"]')) return;
        if (['ArrowRight', 'ArrowDown', 'PageDown', ' '].includes(event.key)) { event.preventDefault(); navigate('next'); }
        else if (['ArrowLeft', 'ArrowUp', 'PageUp'].includes(event.key)) { event.preventDefault(); navigate('prev'); }
        else if (event.key === 'Home') { event.preventDefault(); render(0); }
        else if (event.key === 'End') { event.preventDefault(); render(total - 1); }
        else if (event.key.toLowerCase() === 'f') { event.preventDefault(); enterFullscreen(); }
      });
      document.querySelector('.edge.prev').addEventListener('click', () => navigate('prev'));
      document.querySelector('.edge.next').addEventListener('click', () => navigate('next'));
      window.addEventListener('hashchange', () => render(Number(location.hash.slice(1)) - 1 || 0, false));
      window.addEventListener('message', event => {
        if (event.data?.type === 'nova-command') {
          const actions = {
            next: () => navigate('next'),
            prev: () => navigate('prev'),
            home: () => render(0),
            end: () => render(total - 1),
            fullscreen: enterFullscreen
          };
          actions[event.data.command]?.();
          return;
        }
        if (event.data?.type !== 'nova-child-slide-change') return;
        const deckIndex = decks.findIndex(deck => deck.id === event.data.deckId);
        if (deckIndex < 0 || !frames.get(event.data.deckId).classList.contains('is-active')) return;
        const offset = decks.slice(0, deckIndex).reduce((sum, deck) => sum + deck.slideCount, 0);
        const reported = offset + Math.max(0, Math.min(decks[deckIndex].slideCount - 1, event.data.index));
        if (reported !== index) render(reported);
      });
      stage.addEventListener('touchstart', event => { touchStartX = event.changedTouches[0]?.clientX ?? null; }, { passive: true });
      stage.addEventListener('touchend', event => {
        if (touchStartX === null) return;
        const distance = (event.changedTouches[0]?.clientX ?? touchStartX) - touchStartX;
        touchStartX = null;
        if (Math.abs(distance) >= 48) render(index + (distance < 0 ? 1 : -1));
      }, { passive: true });
      render(index, false);
    })();
  </script>
