wer, supported by a Structured FAQ Knowledge Base and Hybrid Answering Logic\">\n        <div class=\"intro-flow\">\n          <div class=\"intro-node\"><b>Freshman Question</b><small>practical campus enquiry</small></div>\n          <span class=\"intro-link\" aria-hidden=\"true\"></span>\n          <section class=\"intro-core\">\n            <h3>Nova Chatbot Core</h3>\n            <p>connects student needs with verified evidence</p>\n            <div class=\"intro-supports\">\n              <article class=\"intro-support\"><h4>Structured FAQ Knowledge Base</h4><p>verified campus information</p></article>\n              <article class=\"intro-support\"><h4>Hybrid Answering Logic</h4><p>intent rules · category prediction · retrieval · confidence control</p></article>\n            </div>\n          </section>\n          <span class=\"intro-link\" aria-hidden=\"true\"></span>\n          <div class=\"intro-node answer\"><b>Reliable Campus Answer</b><small>clear student guidance</small></div>\n        </div>\n      </div>\n      <span class=\"slide-no\">01</span><div class=\"footer\">Yang Yuwei <span>/ AIT2509049</span></div>\n    </section>\n\n    <section class=\"slide problem\" data-title=\"Why Freshman Enquiries Are Difficult\" aria-hidden=\"true\">\n      <header><p class=\"kicker reveal\">The challenge</p><h2 class=\"slide-title reveal d2\">Why Freshman Enquiries Are Difficult</h2><p class=\"lead reveal d3\">The difficulty is not just understanding a question. Nova must locate the right campus information and return it without inventing an answer.</p></header>\n      <div class=\"problem-grid reveal d3\">\n        <article class=\"problem-card card\"><span class=\"problem-index\">01</span><h3>Information is scattered</h3><p>Notices, handbooks, orientation materials, emails, and online platforms divide one student journey across many sources.</p><p class=\"problem-example\">The answer may exist — but the student may not know where.</p></article>\n        <article class=\"problem-card card\"><span class=\"problem-index\">02</span><h3>Questions are informal</h3><p>Freshmen use short, incomplete, and varied wording for the same issue. The system must understand meaning beyond exact phrasing.</p><p class=\"problem-example\">“Moodle cannot enter” and “learning platform login problem” may mean the same thing.</p></article>\n        <article class=\"problem-card card key\"><span class=\"key-badge\">Key motivation</span><span class=\"problem-index\">03</span><h3>Answers must be verified</h3><p>Campus questions often involve procedures or rules. Answers must be grounded in verified FAQ data, not plausible guesses.</p><p class=\"problem-example\">When evidence is weak, Nova should clarify or fall back — not guess.</p></article>\n      </div>\n      <p class=\"problem-conclusion reveal d4\">Useful answers require both language understanding and reliable evidence.</p>\n      <span class=\"slide-no\">02</span><div class=\"footer\">Yang Yuwei <span>/ AIT2509049</span></div>\n    </section>\n\n    <section class=\"slide roadmap\" data-title=\"From Student Question to Verified Answer\" aria-hidden=\"true\">\n      <header><div><p class=\"kicker reveal\">System roadmap</p><h2 class=\"slide-title reveal d2\">From Student Question to Verified Answer</h2></div><p class=\"lead reveal d3\">Nova turns informal student input into a controlled response through a staged FAQ retrieval pipeline.</p></header>\n      <div class=\"roadmap-track reveal d3\"><div class=\"roadmap-line\"></div><div class=\"roadmap-nodes\">\n        <article class=\"road-node\"><div class=\"road-icon\">01</div><h3>Student Question</h3><p>Informal campus enquiry</p></article>\n        <article class=\"road-node\"><div class=\"road-icon\">02</div><h3>Text Processing</h3><p>Normalize the input</p></article>\n        <article class=\"road-node\"><div class=\"road-icon\">03</div><h3>Simple Intent Rule</h3><p>Handle direct intents</p></article>\n        <article class=\"road-node\"><div class=\"road-icon\">04</div><h3>Category Prediction</h3><p>Estimate enquiry type</p></article>\n        <article class=\"road-node\"><div class=\"road-icon\">05</div><h3>FAQ Retrieval</h3><p>Lexical + semantic signals</p></article>\n        <article class=\"road-node\"><div class=\"road-icon\">06</div><h3>Confidence Decision</h3><p>Control uncertainty</p></article>\n      </div></div>\n      <div class=\"knowledge-base reveal d4\" aria-label=\"Structured FAQ Knowledge Base supporting FAQ retrieval\"><b>Structured FAQ Knowledge Base</b><span>question · answer · category · keywords · verification status</span></div>\n      <div class=\"output-band reveal d4\" aria-label=\"Possible response outcomes\"><span>Verified Answer</span><span>Related Questions</span><span>Fallback</span></div>\n      <span class=\"slide-no\">03</span><div class=\"footer\">Yang Yuwei <span>/ AIT2509049</span></div>\n    </section>\n\n    <section class=\"slide hybrid\" data-title=\"Why Hybrid\" aria-hidden=\"true\">\n      <header><div><p class=\"kicker reveal\">Design rationale</p><h2 class=\"slide-title reveal d2\">Why Hybrid?</h2></div><p class=\"lead reveal d3\">No single method covers intent handling, question understanding, evidence retrieval, and uncertainty equally well.</p></header>\n      <div class=\"hybrid-grid reveal d3\">\n        <section class=\"compare-panel problem-side card\"><h3>Single-method chatbot problems</h3><div class=\"compare-list\">\n          <div class=\"compare-row\"><span>×</span><b>Pure rule-based systems are rigid</b></div>\n          <div class=\"compare-row\"><span>×</span><b>Pure ML classification does not answer by itself</b></div>\n          <div class=\"compare-row\"><span>×</span><b>Free-form generation may produce unsupported answers</b></div>\n          <div class=\"compare-row\"><span>×</span><b>Pure keyword search misses varied wording</b></div>\n        </div></section>\n        <div class=\"bridge\"><div>Combine<br>strengths<br>→</div></div>\n        <section class=\"compare-panel solution-side card\"><h3>Nova hybrid solution</h3><div class=\"compare-list\">\n          <div class=\"compare-row\"><span>✓</span><b>Rules handle simple intents</b></div>\n          <div class=\"compare-row\"><span>✓</span><b>Category prediction guides FAQ search</b></div>\n          <div class=\"compare-row\"><span>✓</span><b>Retrieval grounds answers in verified FAQ data</b></div>\n          <div class=\"compare-row\"><span>✓</span><b>Confidence control manages uncertainty</b></div>\n        </div></section>\n      </div>\n      <p class=\"hybrid-conclusion reveal d4\">Hybrid design makes Nova more reliable, explainable, and suitable for campus FAQ answering.</p>\n      <span class=\"slide-no\">04</span><div class=\"footer\">Yang Yuwei <span>/ AIT2509049</span></div>\n    </section>\n\n    <button class=\"nav-zone prev\" type=\"button\" aria-label=\"Previous slide\"></button><button class=\"nav-zone next\" type=\"button\" aria-label=\"Next slide\"></button><div class=\"progress\" aria-hidden=\"true\"><span></span></div><div class=\"counter\" aria-live=\"polite\"></div>\n  </main></div>\n  <script>\n    (()=>{const deck=document.querySelector('.deck'),stage=document.querySelector('.stage'),slides=[...document.querySelectorAll('.slide')],counter=document.querySelector('.counter'),progress=document.querySelector('.progress > span'),prevButton=document.querySelector('.nav-zone.prev'),nextButton=document.querySelector('.nav-zone.next');let index=Math.max(0,Math.min(slides.length-1,Number(location.hash.slice(1))-1||0)),touchStartX=null;function resizeStage(){const scale=Math.min(stage.clientWidth/1600,stage.clientHeight/900);deck.style.setProperty('--deck-scale',String(scale))}const isEditing=t=>t instanceof Element&&Boolean(t.closest('input,textarea,select,button:not(.nav-zone),[contenteditable=\"true\"]'));function render(nextIndex,updateHash=true){index=Math.max(0,Math.min(slides.length-1,nextIndex));slides.forEach((slide,i)=>{c op: 0;\n      bottom: 0;\n      width: 12%;\n      border: 0;\n      padding: 0;\n      background: transparent;\n      cursor: pointer;\n    }\n\n    .nav-zone.prev { left: 0; }\n    .nav-zone.next { right: 0; }\n    .nav-zone::before {\n      position: absolute;\n      top: 50%;\n      color: rgba(24, 36, 51, .24);\n      font-size: 28px;\n      opacity: 0;\n      transform: translateY(-50%);\n      transition: color 180ms var(--ease), opacity 180ms var(--ease), transform 180ms var(--ease);\n    }\n    .nav-zone.prev::before { content: \"←\"; left: 30px; }\n    .nav-zone.next::before { content: \"→\"; right: 30px; }\n    .nav-zone:hover::before, .nav-zone:focus-visible::before { color: var(--blue); opacity: 1; }\n    .nav-zone.prev:hover::before { transform: translate(-4px, -50%); }\n    .nav-zone.next:hover::before { transform: translate(4px, -50%); }\n    .nav-zone:focus-visible { outline: 3px solid var(--blue); outline-offset: -8px; }\n\n    @media (prefers-reduced-motion: reduce) {\n      *, *::before, *::after {\n        scroll-behavior: auto !important;\n        transition-duration: .01ms !important;\n        animation-duration: .01ms !important;\n        animation-iteration-count: 1 !important;\n      }\n      .chunk-out { opacity: 1; transform: none; }\n    }\n\n    @page { size: 16in 9in; margin: 0; }\n\n    @media print {\n      html, body {\n        display: block;\n        width: auto;\n        height: auto;\n        overflow: visible;\n        background: #fff;\n        print-color-adjust: exact;\n        -webkit-print-color-adjust: exact;\n      }\n\n      .stage { width: 16in; height: auto; overflow: visible; box-shadow: none; }\n      .deck { position: relative; width: 16in; height: auto; transform: none; overflow: visible; }\n      .slide {\n        position: relative;\n        width: 16in;\n        height: 9in;\n        break-after: page;\n        opacity: 1;\n        visibility: visible;\n        transform: none;\n        transition: none;\n      }\n      .slide .reveal { animation: none !important; }\n      .chunk-out { opacity: 1; transform: none; animation: none !important; }\n      .progress, .counter, .nav-zone { display: none; }\n    }\n  </style>\n</head>\n<body>\n  <div class=\"stage\">\n    <main class=\"deck\" aria-label=\"FAQ Data Pipeline slide presentation\">\n      <section class=\"slide hero is-active\" data-title=\"From Scattered Articles to Structured Knowledge\" aria-hidden=\"false\" tabindex=\"-1\">\n        <div class=\"hero-copy\">\n          <p class=\"kicker reveal\">FAQ Data Pipeline</p>\n          <h1 class=\"reveal d2\">From Scattered Articles to <em>Structured Knowledge</em></h1>\n          <p class=\"subtitle reveal d3\">FAQ Data Pipeline for Freshmen Chatbot</p>\n        </div>\n        <div class=\"converge reveal d3\" role=\"img\" aria-label=\"WeChat and handbook documents converge into one structured database\">\n          <div class=\"source-doc wechat\">\n            <svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"M24 39c-9 0-16-5-16-12s7-12 16-12 16 5 16 12-7 12-16 12Z\"/><path d=\"M40 27c9 0 16 5 16 12s-7 12-16 12c-3 0-6-.5-8-1.7L24 52l2.6-6.4C25 43.8 24 41.5 24 39\"/><path d=\"M18 25h.1M30 25h.1M36 37h.1M48 37h.1\"/></svg>\n            <p>WeChat</p>\n          </div>\n          <div class=\"source-doc handbook\">\n            <svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"M18 10h25a7 7 0 0 1 7 7v37H20a6 6 0 0 1-6-6V14a4 4 0 0 1 4-4Z\"/><path d=\"M20 48h30M22 20h18M22 29h22M22 38h14\"/></svg>\n            <p>Handbook</p>\n          </div>\n          <div class=\"knowledge-card\">\n            <h3>Structured Knowledge</h3>\n            <p>FAQ database</p>\n            <div class=\"node-map\">\n              <svg viewBox=\"0 0 326 232\" aria-hidden=\"true\">\n                <path d=\"M163 116 53 47M163 116 271 58M163 116 70 180M163 116 268 181\" stroke=\"currentColor\" stroke-width=\"2\" stroke-dasharray=\"7 9\" fill=\"none\"/>\n              </svg>\n              <span class=\"k-node main\">FAQ</span>\n              <span class=\"k-node n1\">Clean</span>\n              <span class=\"k-node n2\">Classify</span>\n              <span class=\"k-node n3\">Validate</span>\n              <span class=\"k-node n4\">Export</span>\n            </div>\n            <div class=\"data-rows\" aria-hidden=\"true\">\n              <div class=\"data-row\"><span>Chunk</span><span style=\"width:92%\"></span></div>\n              <div class=\"data-row\"><span>FAQ</span><span></span></div>\n              <div class=\"data-row\"><span>JSON</span><span></span></div>\n            </div>\n          </div>\n        </div>\n        <span class=\"slide-no\">01</span>\n        <div class=\"footer\">Yu Yue <span>/ AIT2509052</span></div>\n      </section>\n\n      <section class=\"slide pipeline-slide\" data-title=\"The 8-Step Pipeline\" aria-hidden=\"true\" tabindex=\"-1\">\n        <header>\n          <p class=\"kicker reveal\">System overview</p>\n          <h2 class=\"slide-title reveal d2\">The 8-Step Pipeline</h2>\n        </header>\n        <div class=\"flow-track reveal d3\" role=\"img\" aria-label=\"Eight step pipeline from crawling to JSON export\">\n          <article class=\"flow-step\" style=\"--i:0\"><div class=\"flow-dot\"><svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><circle cx=\"28\" cy=\"28\" r=\"16\"/><path d=\"m40 40 12 12\"/></svg></div><span class=\"flow-arrow\">&rarr;</span><p class=\"flow-name\">Crawler</p><p class=\"flow-note\">fetch raw content</p></article>\n          <article class=\"flow-step\" style=\"--i:1\"><div class=\"flow-dot\"><svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"M14 18h36M14 32h26M14 46h18\"/><path d=\"m45 28 7 7-12 12-7-7Z\"/></svg></div><span class=\"flow-arrow\">&rarr;</span><p class=\"flow-name\">Preprocessor</p><p class=\"flow-note\">clean &amp; format data</p></article>\n          <article class=\"flow-step\" style=\"--i:2\"><div class=\"flow-dot\"><svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"M16 12h32v40H16zM16 26h32M16 40h32\"/></svg></div><span class=\"flow-arrow\">&rarr;</span><p class=\"flow-name\">Chunker</p><p class=\"flow-note\">split documents</p></article>\n          <article class=\"flow-step\" style=\"--i:3\"><div class=\"flow-dot\"><svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"M15 18h18v14H15zM31 38h18v14H31zM37 14l12 12M49 14 37 26\"/></svg></div><span class=\"flow-arrow\">&rarr;</span><p class=\"flow-name\">Classifier</p><p class=\"flow-note\">label data</p></article>\n          <article class=\"flow-step\" style=\"--i:4\"><div class=\"flow-dot\"><svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"M15 16h34v28H25l-10 8V16Z\"/><path d=\"M24 25h17M24 34h11\"/></svg></div><span class=\"flow-arrow\">&rarr;</span><p class=\"flow-name\">FAQ_Generator</p><p class=\"flow-note\">build QA pairs</p></article>\n          <article class=\"flow-step\" style=\"--i:5\"><div class=\"flow-dot\"><svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"M32 12v40M12 32h40\"/><circle cx=\"32\" cy=\"32\" r=\"17\"/></svg></div><span class=\"flow-arrow\">&rarr;</span><p class=\"flow-name\">Augmenter</p><p class=\"flow-note\">enrich dataset</p></article>\n          <article class=\"flow-step\" style=\"--i:6\"><div class=\"flow-dot\"><svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"m15 34 11 11 23-26\"/><path d=\"M14 14h36v36H14z\"/></svg></div><span class=\"flow-arrow\">&rarr;</span><p class=\"flow-name\">Validator</p><p class=\"flow-note\">ensure data quality</p></article>\n          <article class=\"flow-step\" style=\"--i:7\"><div class=\"flow-dot\"><svg class=\"icon\" viewBox=\"0 0 64 64\" aria-hidden=\"true\"><path d=\"M18 12h28l6 7v33H18z\"/><path d=\"M27 30h10M24 40h16M46 12v9h6\"/></svg></div><p class=\"flow-name\">Ingestor</p><p class=\"flow-note\">write to storage</p></article>\n        </div>\n        <span class=\"slide-no\">02</span>\n        <div class=\"footer\">Yu Yue <span>/ AIT2509052</span></div>\n      </section>\n\n      <section class=\"slide cleaning\" data-title=\"Cleaning the Raw Text\" aria-hidden=\"true\" tabindex=\"-1\">\n        <header>\n          <p class=\"kicker reveal\">Highlight 1</p>\n          <h2 class=\"slide-title reveal d2\">Cleaning the Raw Text</h2>\n          <p class=\"subline reveal d2\">Raw WeChat articles contain noise that breaks machine parsing</p>\n        </header>\n        <div class=\"before-after reveal d3\">\n          <article class=\"text-panel\">\n            <h3>Before</h3>\n            <div class=\"noise-lines\" aria-label=\"Noisy text lines\">\n              <div class=\"noise-line\" style=\"width:86%\"></div><div class=\"noise-line\"></div><div class=\"noise-line\"></div><div class=\"noise-line\"></div><div class=\"noise-line\"></div><div class=\"noise-line\"></div>\n            </div>\n            <div class=\"noise-symbols\" aria-hidden=\"true\">✦ @@@ ↵↵ … ▧ ?! #</div>\n            <div class=\"chip-row panel-tags\"><span class=\"chip\">🎉 Emojis</span><span class=\"chip\">↵↵ Broken line breaks</span><span class=\"chip\">… Incomplete sentences</span><span class=\"chip\">📷 Embedded images</span></div>\n          </article>\n          <div class=\"transform-arrow\" aria-hidden=\"true\">&rarr;</div>\n          <article class=\"text-panel\">\n            <h3>After</h3>\n            <div class=\"hierarchy\" aria-label=\"Clean H1 H2 H3 heading hierarchy\">\n              <div class=\"heading-row h1\"><b>#</b><span style=\"width:88%\">Title</span></div>\n              <div class=\"heading-row h2\"><b>##</b><span>Section</span></div>\n              <div class=\"heading-row h3\"><b>###</b><span>Subsection</span></div>\n            </div>\n            <div class=\"chip-row panel-tags\"><span class=\"chip\">Clean structure</span><span class=\"chip\">Markdown-ready</span></div>\n          </article>\n        </div>\n        <div class=\"chip-row reveal d4\"><span class=\"chip\">✓ Auto Noise Removal</span><span class=\"chip\">✓ Manual Review per Article</span><span class=\"chip\">✓ 206 Chunks Output</span></div>\n        <span class=\"slide-no\">03</span>\n        <div class=\"footer\">Yu Yue <span>/ AIT2509052</span></div>\n      </section>\n\n      <section class=\"slide split\" data-title=\"Split by Heading Level\" aria-hidden=\"true\" tabindex=\"-1\">\n        <header>\n          <p class=\"kicker reveal\">Highlight 1</p>\n          <h2 class=\"slide-title reveal d2\">Split by Heading Level</h2>\n          <p class=\"subline reveal d2\">Not by word count — by semantic heading structure</p>\n        </header>\n        <p class=\"rule-line reveal d3\">Default: each <span class=\"code\">##</span> → 1 chunk / each <span class=\"code\">###</span> → 1 independent chunk</p>\n        <div class=\"chunking-layout reveal d3\">\n          <div class=\"chunk-stage\" role=\"img\" aria-label=\"A structured handbook is cut at heading lines into H2 and H3 chunks\">\n            <div class=\"source-sheet\">\n              <span class=\"doc-h1\"># Student Handbook</span>\n              <span class=\"doc-h2\">## Tuition &amp; Fees</span><span class=\"doc-copy\">All students must complete payment before the semester starts.</span>\n              <span class=\"doc-h3\">### Payment Methods</span><span class=\"doc-copy\">You may pay via online banking or campus cashier.</span>\n              <span class=\"doc-h3\">### Deadlines</span><span class=\"doc-copy\">Late payment incurs a penalty fee of RM50.</span>\n              <span class=\"doc-h2\">## Campus Services</span><span class=\"doc-copy\">The university provides various support services for students.</span>\n              <span class=\"doc-h3\">### Library Access</span><span class=\"doc-copy\">Students can borrow up to 5 books at a time.</span>\n            </div>\n            <div class=\"chunk-out h2 c1\" style=\"--i:0\"><b>## Tuition &amp; Fees</b><span>Payment before semester start</span><em class=\"level-tag\">h2 chunk</em></div>\n            <div class=\"chunk-out c2\" style=\"--i:1\"><b>### Payment Methods</b><span>Online banking or campus cashier</span><em class=\"level-tag\">h3 chunk</em></div>\n            <div class=\"chunk-out c3\" style=\"--i:2\"><b>### Deadlines</b><span>Late payment: RM50 penalty</span><em class=\"level-tag\">h3 chunk</em></div>\n            <div class=\"chunk-out h2 c4\" style=\"--i:3\"><b>## Campus Services</b><span>Student support services</span><em class=\"level-tag\">h2 chunk</em></div>\n            <div class=\"chunk-out c5\" style=\"--i:4\"><b>### Library Access</b><span>Borrow up to 5 books</span><em class=\"level-tag\">h3 chunk</em></div>\n          </div>\n          <div class=\"override-stack\" aria-label=\"Heading marker overrides\">\n            <article class=\"override-card\"><b>@ after ###</b><p>merges into H2</p></article>\n            <article class=\"override-card\"><b>@ after ##</b><p>entire H2 = 1 chunk</p></article>\n            <article class=\"override-card\"><b>@ after #</b><p>H3s ignored</p></article>\n            <article class=\"override-card\"><b>% after #</b><p>extra H1 chunk</p></article>\n          </div>\n        </div>\n        <div class=\"chip-row reveal d4\"><span class=\"chip\">Output levels:</span><span class=\"chip code\">h2</span><span class=\"chip code\">h3</span><span class=\"chip code\">h1_full</span></div>\n        <span class=\"slide-no\">04</span>\n        <div class=\"footer\">Yu Yue <span>/ AIT2509052</span></div>\n      </section>\n\n      <section class=\"slide donut-slide\" data-title=\"8 Categories by Keyword Matching\" aria-hidden=\"true\" tabindex=\"-1\">\n        <header>\n          <p class=\"kicker reveal\">Highlight 2</p>\n          <h2 class=\"slide-title reveal d2\">8 Categories by Keyword Matching</h2>\n        </header>\n        <div class=\"chart-grid\">\n          <div class=\"donut-wrap reveal d3\" role=\"img\" aria-label=\"Donut chart showing chunk counts across eight categories and one unmatched chunk\">\n            <div class=\"donut\"></div>\n            <div class=\"donut-center\"><b>206</b><span>Chunks total</span></div>\n            <span class=\"donut-pct p1\">39.3%</span><span class=\"donut-pct p2\">13.6%</span><span class=\"donut-pct p3\">11.2%</span><span class=\"donut-pct p4\">11.2%</span><span class=\"donut-pct p5\">8.7%</span><span class=\"donut-pct p6\">6.3%</span><span class=\"donut-pct p7\">4.9%</span><span class=\"donut-pct p8\">4.4%</span>\n          </div>\n          <div class=\"reveal d4\">\n            <div class=\"legend\">\n              <div class=\"legend-item\" style=\"--c:#165a91\"><span class=\"swatch\"></span><span>campus_life</span><b>81 · 39.3%</b></div>\n              <div class=\"legend-item\" style=\"--c:#c86546\"><span class=\"swatch\"></span><span>accommodation_living</span><b>28 · 13.6%</b></div>\n              <div class=\"legend-item\" style=\"--c:#758878\"><span class=\"swatch\"></span><span>academic_affairs</span><b>23 · 11.2%</b></div>\n              <div class=\"legend-item\" style=\"--c:#d5a63f\"><span class=\"swatch\"></span><span>transportation</span><b>23 · 11.2%</b></div>\n              <div class=\"legend-item\" style=\"--c:#7e5f7d\"><span class=\"swatch\"></span><span>registration_orientation</span><b>18 · 8.7%</b></div>\n              <div class=\"legend-item\" style=\"--c:#4b8a8b\"><span class=\"swatch\"></span><span>campus_services</span><b>13 · 6.3%</b></div>\n              <div class=\"legend-item\" style=\"--c:#9a7555\"><span class=\"swatch\"></span><span>it_support</span><b>10 · 4.9%</b></div>\n              <div class=\"legend-item\" style=\"--c:#5c6f99\"><span class=\"swatch\"></span><span>finance_fees</span><b>9 · 4.4%</b></div>\n            </div>\n            <div class=\"callouts\">\n              <div class=\"callout\"><b>206</b><span>Chunks total</span></div>\n (--blue);\n      color: var(--blue);\n      font-family: Georgia, serif;\n      font-size: 25px;\n      font-style: italic;\n    }\n\n    .prep-step:nth-child(2) .prep-index { border-color: var(--terracotta); color: var(--terracotta); }\n    .prep-step:nth-child(3) .prep-index { border-color: var(--saffron); color: #956b13; }\n    .prep-step:nth-child(4) .prep-index { border-color: var(--sage); color: var(--sage); }\n\n    .prep-step h3 { min-height: 58px; font-family: Georgia, serif; font-size: 26px; font-weight: 500; line-height: 1.07; }\n    .prep-step p { margin-top: 13px; max-width: 24ch; color: var(--muted); font-size: 17px; line-height: 1.42; }\n\n    .prep-step {\n      transition: transform 360ms var(--ease), opacity 360ms var(--ease);\n    }\n\n    .prep-step .prep-index {\n      transition: background 360ms var(--ease), color 360ms var(--ease), box-shadow 360ms var(--ease), transform 360ms var(--ease);\n    }\n\n    .preprocess[data-prep-step=\"0\"] .prep-step { opacity: .52; }\n    .preprocess[data-prep-step=\"1\"] .prep-step:nth-child(1),\n    .preprocess[data-prep-step=\"2\"] .prep-step:nth-child(2),\n    .preprocess[data-prep-step=\"3\"] .prep-step:nth-child(3),\n    .preprocess[data-prep-step=\"4\"] .prep-step:nth-child(4) {\n      opacity: 1;\n      transform: translateY(-8px);\n    }\n\n    .preprocess[data-prep-step=\"1\"] .prep-step:nth-child(1) .prep-index {\n      background: var(--blue);\n      color: var(--white);\n      box-shadow: 0 12px 28px rgba(22, 90, 145, .22);\n      transform: scale(1.08);\n    }\n\n    .preprocess[data-prep-step=\"2\"] .prep-step:nth-child(2) .prep-index {\n      background: var(--terracotta);\n      color: var(--white);\n      box-shadow: 0 12px 28px rgba(200, 101, 70, .24);\n      transform: scale(1.08);\n    }\n\n    .preprocess[data-prep-step=\"3\"] .prep-step:nth-child(3) .prep-index {\n      background: var(--saffron);\n      color: var(--white);\n      box-shadow: 0 12px 28px rgba(213, 166, 63, .25);\n      transform: scale(1.08);\n    }\n\n    .preprocess[data-prep-step=\"4\"] .prep-step:nth-child(4) .prep-index {\n      background: var(--sage);\n      color: var(--white);\n      box-shadow: 0 12px 28px rgba(117, 136, 120, .25);\n      transform: scale(1.08);\n    }\n\n    .transform {\n      display: grid;\n      min-height: 168px;\n      align-items: center;\n      padding: 28px 34px;\n      border-top: 1px solid var(--line);\n      border-bottom: 1px solid var(--line);\n      background: rgba(255, 253, 248, .48);\n    }\n\n    .transform-stage {\n      display: grid;\n      gap: 18px;\n    }\n\n    .phrase { font-family: Georgia, serif; font-size: 27px; line-height: 1.25; }\n    .phrase.after { color: var(--blue); }\n    .arrow { color: var(--terracotta); font-size: 45px; text-align: center; }\n    .animated-phrase {\n      min-height: 45px;\n      color: var(--ink);\n      transition: color 260ms var(--ease), transform 260ms var(--ease), opacity 260ms var(--ease);\n    }\n\n    .animated-phrase.is-changing {\n      opacity: .2;\n      transform: translateY(8px);\n    }\n\n    .token-row {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 10px;\n      min-height: 44px;\n      align-items: center;\n      transition: gap 360ms var(--ease);\n    }\n\n    .token {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-height: 38px;\n      max-width: 170px;\n      padding: 8px 13px;\n      border: 1px solid var(--line);\n      border-radius: 999px;\n      background: var(--white);\n      color: var(--blue-dark);\n      font-size: 17px;\n      font-weight: 750;\n      font-family: \"Avenir Next\", Avenir, \"Segoe UI\", Arial, sans-serif;\n      line-height: 1.2;\n      box-shadow: 0 10px 24px rgba(24, 36, 51, .06);\n      overflow: hidden;\n      white-space: nowrap;\n      transition:\n        max-width 420ms var(--ease),\n        min-height 420ms var(--ease),\n        padding 420ms var(--ease),\n        border-width 420ms var(--ease),\n        border-color 420ms var(--ease),\n        border-radius 420ms var(--ease),\n        opacity 300ms var(--ease),\n        color 300ms var(--ease),\n        background 300ms var(--ease),\n        font-size 420ms var(--ease),\n        font-weight 420ms var(--ease),\n        line-height 420ms var(--ease),\n        box-shadow 300ms var(--ease),\n        transform 300ms var(--ease);\n    }\n\n    .token.sentence-token {\n      min-height: auto;\n      max-width: 250px;\n      padding: 0;\n      border-width: 0;\n      border-radius: 0;\n      background: transparent;\n      color: var(--ink);\n      font-family: Georgia, serif;\n      font-size: 27px;\n      font-weight: 500;\n      line-height: 1.25;\n      box-shadow: none;\n    }\n\n    .token.normalized {\n      animation: tokenMorph 520ms var(--ease) both;\n    }\n\n    .token.pre-chip {\n      border-color: transparent;\n      background: transparent;\n      box-shadow: none;\n    }\n\n    .token.removed {\n      color: rgba(102, 112, 122, .55);\n      text-decoration: line-through;\n      background: rgba(255, 253, 248, .52);\n      box-shadow: none;\n    }\n\n    .token.exiting {\n      max-width: 0;\n      min-height: 38px;\n      padding-left: 0;\n      padding-right: 0;\n      border-width: 0;\n      opacity: 0;\n      transform: scale(.9);\n    }\n\n    .token.collapsed {\n      display: none;\n    }\n\n    .token.stemmed {\n      border-color: rgba(117, 136, 120, .42);\n      color: var(--sage);\n      background: rgba(117, 136, 120, .10);\n    }\n\n    .token.changed {\n      animation: tokenMorph 520ms var(--ease) both;\n    }\n\n    @keyframes tokenIn {\n      from { opacity: 0; transform: translateY(10px) scale(.96); }\n      to { opacity: 1; transform: none; }\n    }\n\n    @keyframes tokenMorph {\n      0% { transform: translateY(0) scale(1); }\n      45% { transform: translateY(-5px) scale(1.06); }\n      100% { transform: translateY(0) scale(1); }\n    }\n\n    .prep-hint {\n      color: var(--muted);\n      font-size: 14px;\n      font-weight: 700;\n      letter-spacing: .08em;\n      text-transform: uppercase;\n    }\n\n    .preprocess[data-prep-step=\"0\"] .prep-stage-label,\n    .preprocess[data-prep-step=\"0\"] .prep-hint {\n      display: none;\n    }\n\n    .preprocess[data-prep-step=\"0\"] .token-row,\n    .preprocess[data-prep-step=\"1\"] .token-row {\n      gap: 7px;\n    }\n\n    .preprocess[data-prep-step=\"2\"] .token-row {\n      gap: 10px;\n    }\n\n    .prototype-note { margin-top: 14px; color: var(--muted); font-size: 14px; line-height: 1.35; }\n    .prototype-note strong { color: var(--ink); }\n\n    /* Slide 3 */\n    .intent { display: grid; grid-template-rows: auto 1fr; gap: 28px; }\n\n    .intent-grid {\n      display: grid;\n      grid-template-columns: .73fr 1.27fr;\n      gap: 54px;\n      align-items: center;\n    }\n\n    .direct-copy { align-self: start; padding-top: 24px; }\n    .direct-copy h3 { margin-top: 16px; max-width: 12ch; font-family: Georgia, serif; font-size: 39px; font-weight: 500; line-height: 1.08; }\n\n    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 26px; max-width: 430px; }\n    .chip { padding: 11px 16px; border-radius: 999px; background: var(--white); border: 1px solid var(--line); color: var(--blue-dark); font-size: 16px; font-weight: 750; }\n\n    .fixed-reply {\n      margin-top: 28px;\n      padding: 18px 20px;\n      border-left: 3px solid var(--terracotta);\n      color: var(--muted);\n      font-size: 17px;\n      line-height: 1.4;\n    }\n\n    .decision-tree {\n      display: grid;\n      grid-template-columns: 180px 64px 175px 64px 220px;\n      grid-template-rows: 150px 46px 150px 46px 92px;\n      align-items: center;\n      justify-content: center;\n    }\n\n    .node {\n      display: grid;\n      place-items: center;\n      min-height: 82px;\n      padding: 14px;\n      border: 1px solid var(--line);\n      background: rgba(255, 253, 248, .72);\n      text-align: center;\n      font-size: 17px;\n      font-weight: 750;\n      line-height: 1.25;\n      box-shadow: 0 12px 28px rgba(24, 36, 51, .06);\n    }\n\n    .node.query { grid-column: 1; grid-row: 1; border-color: var(--blue); color: var(--blue-dark); }\n    .node.decision { width: 112px; min-height: 112px; justify-self: center; padding: 8px; transform: rotate(45deg); border-radius: 4px; box-shadow: 9px 9px 24px rgba(24, 36, 51, .06); }\n    .node.decision span { transform: rotate(-45deg); }\n    .node.small { grid-column: 3; grid-row: 1; border-color: var(--terracotta); }\n    .node.fixed { grid-column: 5; grid-row: 1; background: var(--terracotta); color: var(--white); border: 0; }\n    .node.template { grid-column: 3; grid-row: 3; border-color: var(--blue); }\n    .node.route { grid-column: 5; grid-row: 3; background: var(--blue); color: var(--white); border: 0; }\n    .node.ml { grid-column: 3; grid-row: 5; width: 220px; justify-self: center; background: var(--ink); color: var(--white); border: 0; }\n\n    .connector { display: flex; align-items: center; justify-content: center; gap: 5px; color: var(--muted); font-size: 12px; font-weight: 800; text-transform: uppercase; }\n    .connector::after { content: \"→\"; color: var(--ink); font-size: 32px; line-height: .8; }\n    .connector.vertical { flex-direction: column; gap: 0; }\n    .connector.vertical::after { content: \"↓\"; font-size: 30px; line-height: .75; }\n    .c1 { grid-column: 2; grid-row: 1; }\n    .c2 { grid-column: 4; grid-row: 1; }\n    .c3 { grid-column: 3; grid-row: 2; }\n    .c4 { grid-column: 4; grid-row: 3; }\n    .c5 { grid-column: 3; grid-row: 4; }\n\n    .templates {\n      position: absolute;\n      left: 92px;\n      bottom: 76px;\n      display: flex;\n      gap: 18px;\n      color: var(--muted);\n      font-size: 13px;\n    }\n    .templates span strong { color: var(--blue-dark); }\n\n    /* Slide 4 */\n    .matters { display: grid; grid-template-columns: .83fr 1.17fr; gap: 80px; align-items: center; }\n    .matters-copy { padding-bottom: 40px; }\n    .matters h2 { max-width: 9ch; font-size: 78px; line-height: .94; }\n    .matters .lead { margin-top: 28px; max-width: 26ch; color: var(--muted); font-size: 21px; line-height: 1.38; }\n\n    .benefit-stack { display: grid; gap: 12px; }\n    .benefit {\n      display: grid;\n      grid-template-columns: 72px 1fr;\n      align-items: center;\n      min-height: 88px;\n      border-bottom: 1px solid var(--line);\n    }\n    .benefit b { color: var(--terracotta); font-family: Georgia, serif; font-size: 29px; font-style: italic; font-weight: 500; }\n    .benefit p { color: var(--ink); font-size: 20px; line-height: 1.25; }\n    .benefit p span { color: var(--muted); }\n\n    .closing-quote {\n      position: absolute;\n      left: 92px;\n      right: 92px;\n      bottom: 84px;\n      padding: 23px 34px 23px 76px;\n      border: 1px solid rgba(200, 101, 70, .25);\n      border-left: 5px solid var(--terracotta);\n      border-radius: 22px;\n      background: rgba(255, 253, 248, .72);\n      color: var(--blue-dark);\n      font-family: Georgia, serif;\n      font-size: 22px;\n      line-height: 1.35;\n      box-shadow: 0 18px 45px rgba(24, 36, 51, .08);\n    }\n    .closing-quote::before { content: \"“\"; position: absolute; left: 25px; top: 5px; color: var(--terracotta); font-size: 62px; }\n    .closing-quote::after { content: \"”\"; position: absolute; right: 27px; bottom: -16px; color: rgba(213, 166, 63, .72); font-size: 62px; }\n\n    .progress {\n      position: absolute;\n      z-index: 10;\n      left: 0;\n      bottom: 0;\n      width: 100%;\n      height: 3px;\n      pointer-events: none;\n    }\n    .progress > span { display: block; width: 0; height: 100%; background: var(--terracotta); transition: width 240ms var(--ease); }\n\n    .counter {\n      position: absolute;\n      z-index: 10;\n      left: 92px;\n      bottom: 43px;\n      color: rgba(24, 36, 51, .42);\n      font-size: 12px;\n      font-variant-numeric: tabular-nums;\n      letter-spacing: .12em;\n      pointer-events: none;\n    }\n\n    .nav-zone { position: absolute; z-index: 5; top: 0; bottom: 0; width: 12%; border: 0; padding: 0; background: transparent; cursor: pointer; }\n    .nav-zone.prev { left: 0; }\n    .nav-zone.next { right: 0; }\n    .nav-zone:focus-visible { outline: 3px solid var(--blue); outline-offset: -8px; }\n\n    @media (prefers-reduced-motion: reduce) {\n      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; }\n    }\n\n    @page { size: 16in 9in; margin: 0; }\n\n    @media print {\n      html, body { display: block; width: auto; height: auto; overflow: visible; background: #fff; print-color-adjust: exact; -webkit-print-color-adjust: exact; }\n      .stage { width: 16in; height: auto; overflow: visible; box-shadow: none; }\n      .deck { position: relative; width: 16in; height: auto; transform: none; overflow: visible; }\n      .slide { position: relative; width: 16in; height: 9in; break-after: page; opacity: 1; visibility: visible; transform: none; transition: none; }\n      .slide .reveal { animation: none !important; }\n      .progress, .counter, .nav-zone { display: none; }\n    }\n  </style>\n</head>\n<body>\n  <div class=\"stage\">\n  <main class=\"deck\" aria-label=\"Combined NLP Layer slide presentation\">\n    <section class=\"slide hero is-active\" data-title=\"Combined NLP Layer\" aria-hidden=\"false\">\n      <div class=\"hero-copy\">\n        <p class=\"kicker reveal\">AIT103 · Hybrid FAQ Chatbot</p>\n        <h1 class=\"reveal d2\">Combined <em>NLP</em> Layer</h1>\n        <p class=\"subtitle reveal d3\">Text Preprocessing + Rule-Based Intent Detection</p>\n      </div>\n      <div class=\"pipeline reveal d3\" role=\"img\" aria-label=\"Pipeline from user input through preprocessing and intent detection to direct reply or FAQ routing\">\n        <div class=\"pipe-step\">\n          <span class=\"pipe-dot\">01</span>\n          <div><p class=\"pipe-name\">User Input</p><p class=\"pipe-note\">Raw freshman enquiry</p></div>\n        </div>\n        <div class=\"pipe-step\">\n          <span class=\"pipe-dot\">02</span>\n          <div><p class=\"pipe-name\">Preprocessing</p><p class=\"pipe-note\">Clean and standardize text</p></div>\n        </div>\n        <div class=\"pipe-step\">\n          <span class=\"pipe-dot\">03</span>\n          <div><p class=\"pipe-name\">Intent Detection</p><p class=\"pipe-note\">Recognize simple patterns first</p></div>\n        </div>\n        <div class=\"pipe-step\">\n          <span class=\"pipe-dot\">04</span>\n          <div><p class=\"pipe-name\">Route</p><div class=\"route-split\"><span>FAQ Route</span><span>Direct Reply</span></div></div>\n        </div>\n      </div>\n      <p class=\"hero-purpose reveal d4\">Standardize user input and quickly route it before FAQ classification and retrieval.</p>\n      <div class=\"footer\">CHEN MOAHN <span>/ AIT2509003</span></div>\n    </section>\n\n    <section class=\"slide preprocess\" data-title=\"Text Preprocessing\" data-prep-step=\"0\" aria-hidden=\"true\">\n      <header>\n        <p class=\"kicker reveal\">01 · Clean the signal</p>\n        <h2 class=\"slide-title reveal d2\">Text Preprocessing</h2>\n      </header>\n      <div class=\"steps-row reveal d3\">\n        <article class=\"prep-step\"><span class=\"prep-index\">1</span><h3>Text<br>normalization</h3><p>Lowercase text; remove extra punctuation and spaces.</p></article>\n        <article class=\"prep-step\"><span class=\"prep-index\">2</span><h3>Tokenization</h3><p>Split each sentence into individual words.</p></article>\n        <article class=\"prep-step\"><span class=\"prep-index\">3</span><h3>Stopword<br>removal</h3><p>Remove low-information words: “can”, “I”, “the”, “please”.</p></article>\n        <article class=\"prep-step\"><span class=\"prep-index\">4</span><h3>Conservative<br>stemming</h3><p>Unify simple plurals and verb-form changes.</p></article>\n      </div>\n      <div class=\"reveal d4\">\n        <div class=\"transform\" aria-label=\"Before and after preprocessing example\">\n          <div class=\"transform-stage\">\n            <p class=\"mini-label prep-stage-label\">Raw input</p>\n            <p class=\"phrase animated-phrase\">“Can I find the Student Clubs’ application forms, please?”</p>\n            <div class=\"token-row\" aria-live=\"polite\"></div>\n            <p class=\"prep-hint\">Click to start preprocessing</p>\n          </div>\n        </div>\n        <p class=\"prototype-note\"><strong>Lightweight by design.</strong> The hand-written prototype uses no third-party NLP libraries, so every rule can be customized for XMUM scenarios.</p>\n      </div>\n      <span class=\"slide-no\">02</span>\n      <div class=\"footer\">CHEN MOAHN <span>/ AIT2509003</span></div>\n    </section>\n\n    <section class=\"slide intent\" data-title=\"Rule-Based Intent Detection\" aria-hidden=\"true\">\n      <header>\n        <p class=\"kicker reveal\">02 · Route the obvious first</p>\n        <h2 class=\"slide-title reveal d2\">Rule-Based Intent Detection</h2>\n      </header>\n      <div class=\"intent-grid\">\n        <div class=\"direct-copy reveal d3\">\n          <p class=\"mini-label\">No retrieval needed</p>\n          <h3>Small talk gets an immediate fixed reply.</h3>\n          <div class=\"chips\" aria-label=\"Small talk examples\"><span class=\"chip\">hi</span><span class=\"chip\">thanks</span><span class=\"chip\">bye</span><span class=\"chip\">who are you</span><span class=\"chip\">help</span></div>\n          <p class=\"fixed-reply\">Fast, predictable handling keeps simple conversations out of the FAQ pipeline.</p>\n        </div>\n        <div class=\"decision-tree reveal d4\" role=\"img\" aria-label=\"Decision tree: user query, small talk check, FAQ template check, then fixed reply, category route, or ML classifier and retrieval\">\n          <div class=\"node query\">User query</div>\n          <div class=\"connector c1\" aria-hidden=\"true\">start</div>\n          <div class=\"node decision small\"><span>Small<br>talk?</span></div>\n          <div class=\"connector c2\">yes</div>\n          <div class=\"node fixed\">Fixed reply</div>\n          <div class=\"connector vertical c3\">no</div>\n          <div class=\"node decision template\"><span>FAQ<br>template?</span></div>\n          <div class=\"connector c4\">yes</div>\n          <div class=\"node route\">Route to category</div>\n          <div class=\"connector vertical c5\">no</div>\n          <div class=\"node ml\">ML classifier<br>+ retrieval</div>\n        </div>\n      </div>\n      <div class=\"templates reveal d4\" aria-label=\"FAQ template examples\">\n        <span><strong>where is…</strong> → location</span>\n        <span><strong>how can I…</strong> → procedure</span>\n        <span><strong>who should I contact…</strong> → contact</span>\n        <span><strong>when is the deadline…</strong> → deadline</span>\n      </div>\n      <span class=\"slide-no\">03</span>\n      <div class=\"footer\">CHEN MOAHN <span>/ AIT2509003</span></div>\n    </section>\n\n    <section class=\"slide matters\" data-title=\"Why This Layer Matters\" aria-hidden=\"true\">\n      <div class=\"matters-copy\">\n        <p class=\"kicker reveal\">03 · The quiet foundation</p>\n        <h2 class=\"reveal d2\">Why This Layer Matters</h2>\n        <p class=\"lead reveal d3\">A small, explainable layer creates cleaner inputs and more stable downstream decisions.</p>\n      </div>\n      <div class=\"benefit-stack reveal d3\" aria-label=\"Five benefits of the combined NLP layer\">\n        <div class=\"benefit\"><b>01</b><p>First filter <span>and router of the chatbot</span></p></div>\n        <div class=\"benefit\"><b>02</b><p>Less noise <span>before ML classification</span></p></div>\n        <div class=\"benefit\"><b>03</b><p>Consistent spelling <span>— Wi-Fi / wifi / wi fi</span></p></div>\n        <div class=\"benefit\"><b>04</b><p>More stable <span>classification and retrieval</span></p></div>\n        <div class=\"benefit\"><b>05</b><p>Lightweight + explainable <span>for campus FAQs</span></p></div>\n      </div>\n      <blockquote class=\"closing-quote reveal d4\">Although this module is simple, it is the foundation that makes the whole FAQ chatbot more stable and controllable.</blockquote>\n      <span class=\"slide-no\">04</span>\n      <div class=\"footer\">CHEN MOAHN <span>/ AIT2509003</span></div>\n    </section>\n\n    <button class=\"nav-zone prev\" type=\"button\" aria-label=\"Previous slide\"></button>\n    <button class=\"nav-zone next\" type=\"button\" aria-label=\"Next slide\"></button>\n    <div class=\"progress\" aria-hidden=\"true\"><span></span></div>\n    <div class=\"counter\" aria-live=\"polite\"></div>\n  </main>\n  </div>\n\n  <script>\n    (() => {\n      const deck = document.querySelector('.deck');\n      const stage = document.querySelector('.stage');\n      const slides = [...document.querySelectorAll('.slide')];\n      const counter = document.querySelector('.counter');\n      const progress = document.querySelector('.progress > span');\n      const prevButton = document.querySelector('.nav-zone.prev');\n      const nextButton = document.querySelector('.nav-zone.next');\n      const preprocessSlide = document.querySelector('.preprocess');\n      const prepLabel = preprocessSlide?.querySelector('.prep-stage-label');\n      const prepPhrase = preprocessSlide?.querySelector('.animated-phrase');\n      const prepTokens = preprocessSlide?.querySelector('.token-row');\n      const prepHint = preprocessSlide?.querySelector('.prep-hint');\n      let index = Math.max(0, Math.min(slides.length - 1, 0));\n      let touchStartX = null;\n      let prepStep = 0;\n      let stemTimer = null;\n\n      const prepStates = [\n        {\n          label: 'Raw input',\n          phrase: '',\n          hint: 'Click to start preprocessing'\n        },\n        {\n          label: '1 · Text normalization',\n          phrase: '',\n          hint: 'Lowercase text; remove punctuation and extra spaces'\n        },\n        {\n          label: '2 · Tokenization',\n          phrase: '',\n          hint: 'Split the sentence into individual word tokens'\n        },\n        {\n          label: '3 · Stopword removal',\n          phrase: '',\n          hint: 'Remove low-information words and keep the useful signal'\n        },\n        {\n          label: '4 · Conservative stemming',\n          phrase: '',\n          hint: 'Unify simple plural forms: clubs → club, forms → form'\n        }\n      ];\n\n      const prepTokenModel = [\n        { key: 'can', raw: '“Can', text: 'can', stopword: true },\n        { key: 'i', raw: 'I', text: 'i', stopword: true },\n        { key: 'find', raw: 'find', text: 'find' },\n        { key: 'the', raw: 'the', text: 'the', stopword: true },\n        { key: 'student', raw: 'Student', text: 'student' },\n        { key: 'clubs', raw: 'Clubs’', text: 'clubs', stem: 'club' },\n        { key: 'application', raw: 'application', text: 'application' },\n        { key: 'forms', raw: 'forms,', text: 'forms', stem: 'form' },\n        { key: 'please', raw: 'please?”', text: 'please', stopword: true }\n      ];\n\n      function resizeStage() {\n        const scale = Math.min(stage.clientWidth / 1600, stage.clientHeight / 900);\n        deck.style.setProperty('--deck-scale', String(scale));\n      }\n\n      const isEditing = (target) => target instanceof Element && Boolean(target.closest('input, textarea, select, button:not(.nav-zone), [contenteditable=\"true\"]'));\n\n      function ensurePrepTokens() {\n        if (!prepTokens || prepTokens.children.length) return;\n        prepTokens.innerHTML = prepTokenModel.map((token, tokenIndex) => (\n          '<span class=\"token sentence-token\" data-key=\"' + token.key + '\" styl  title-slide is-active\" data-title=\"Machine Learning Classification\" aria-hidden=\"false\">\n        <div>\n          <p class=\"kicker reveal\">XMUM Freshman FAQ Chatbot</p>\n          <h1 class=\"reveal d2\">Machine Learning <em>Classification</em></h1>\n          <p class=\"subtitle reveal d3\">SVM, Logistic Regression, and Naive Bayes: which model is best?</p>\n        </div>\n        <div class=\"classification-board reveal d3\" role=\"img\" aria-label=\"A freshman Wi-Fi question is classified into one of eight categories with University Platforms and IT Support highlighted\">\n          <div class=\"board-head\">\n            <div>\n              <p class=\"mini-label\">Classification task</p>\n              <h3>Predict the FAQ topic before retrieval.</h3>\n            </div>\n            <div class=\"board-badge\">8<br>classes</div>\n          </div>\n          <div>\n            <div class=\"query-card\">\n              <span class=\"mini-label\">User question</span>\n              <p>“How do I access the university Wi-Fi?”</p>\n            </div>\n            <div class=\"classifier-core\">\n              <div><strong>Choose the best model</strong></div>\n            </div>\n            <div class=\"category-mini-grid\" aria-label=\"Eight target FAQ categories with University Platforms and IT Support selected\">\n              <span>Academic Affairs</span>\n              <span>Accommodation &amp; Living</span>\n              <span>Campus Services</span>\n              <span>Campus life</span>\n              <span>Finance &amp; Fees</span>\n              <span>Registration &amp; Orientation</span>\n              <span>Transportation</span>\n              <span class=\"selected\">University Platforms &amp; IT Support</span>\n            </div>\n          </div>\n        </div>\n        <div class=\"title-metrics reveal d4\" aria-label=\"Deck summary metrics\">\n          <p><b>3</b><span>models compared</span></p>\n          <p><b>8</b><span>target categories</span></p>\n          <p><b>?</b><span>macro F1 to reveal</span></p>\n        </div>\n        <p class=\"purpose reveal d4\">This presentation compares three classifiers and selects the best model for FAQ topic prediction before retrieval.</p>\n        <div class=\"footer\">HUANG YUHAN <span>/ TCM2409003</span></div>\n      </section>\n\n      <section class=\"slide pipeline-slide\" data-title=\"Role of Classification\" aria-hidden=\"true\">\n        <header>\n          <p class=\"kicker reveal\">01 · Route the real FAQ query</p>\n          <h2 class=\"slide-title reveal d2\">Role of Classification</h2>\n          <p class=\"subtitle reveal d3\">Rule-based intents handle small talk; ML predicts the category for genuine freshman questions.</p>\n        </header>\n        <div class=\"pipeline-body\">\n          <div class=\"flow reveal d3\" role=\"img\" aria-label=\"Routing board showing simple intents handled by rules and FAQ questions handled by machine learning classification\">\n            <div class=\"routing-board\">\n              <div class=\"incoming-card\">\n                <b>?</b>\n                <div>\n                  <strong>Incoming freshman message</strong>\n                  <span>Classify the message route before selecting a response</span>\n                </div>\n              </div>\n              <div class=\"routing-lanes\">\n                <section class=\"route-lane rule\" aria-label=\"Rule-based direct reply lane\">\n                  <header><span>Small talk intent</span><h3>Rule-based reply</h3></header>\n                  <ul>\n                    <li><b>1</b><span>Greeting, thanks, goodbye, help, or identity</span></li>\n                    <li><b>2</b><span>Matched by simple intent rules</span></li>\n                  </ul>\n                  <p class=\"route-result\">Direct reply</p>\n                </section>\n                <section class=\"route-lane ml\" aria-label=\"Machine learning FAQ route lane\">\n                  <header><span>Real FAQ question</span><h3>ML classification route</h3></header>\n                  <ul>\n                    <li><b>1</b><span>Text preprocessing cleans the question</span></li>\n                    <li><b>2</b><span>Classifier predicts one of eight categories</span></li>\n                    <li><b>3</b><span>FAQ retrieval selects the response</span></li>\n                  </ul>\n                  <p class=\"route-result\">Predicted category → answer</p>\n                </section>\n              </div>\n            </div>\n          </div>\n          <div class=\"route-note reveal d4\">\n            <div class=\"category-block\" aria-label=\"Why classification is useful before retrieval\">\n              <p class=\"mini-label\">Meaning of this step</p>\n              <ul class=\"meaning-list\">\n                <li>Route real FAQ questions to the right knowledge area</li>\n                <li>Reduce mismatched retrieval and unsupported answers</li>\n                <li>Make the chatbot response path clearer and more reliable</li>\n              </ul>\n            </div>\n          </div>\n        </div>\n        <span class=\"slide-no\">02</span>\n        <div class=\"footer\">HUANG YUHAN <span>/ TCM2409003</span></div>\n      </section>\n\n      <section class=\"slide\" data-title=\"Training Pipeline\" aria-hidden=\"true\">\n        <header>\n          <p class=\"kicker reveal\">02 · Same text, different representations</p>\n          <h2 class=\"slide-title reveal d2\">Training Pipeline</h2>\n        </header>\n        <div class=\"training-grid\">\n          <div class=\"feature-note reveal d3\">\n            <article>\n              <h3>Controlled comparison</h3>\n              <p>The same FAQ dataset is split with an 80/20 stratified train-test workflow.</p>\n            </article>\n            <article>\n              <h3>Shared preprocessing</h3>\n              <p>Lowercasing, unicode accent stripping, regex tokenization, and stopword removal (scikit-learn ENGLISH_STOP_WORDS).</p>\n            </article>\n            <article>\n              <h3>Two feature routes</h3>\n              <p>Naive Bayes uses word counts; Logistic Regression and Linear SVM use TF-IDF unigram and bigram features.</p>\n            </article>\n          </div>\n          <div class=\"model-lanes reveal d4\" aria-label=\"Training pipelines for Naive Bayes, Logistic Regression, and Linear SVM\">\n            <div class=\"lane\">\n              <div class=\"lane-label\">NB</div>\n              <div class=\"lane-steps\"><span>Data</span><span>Preprocessing</span><span>Word Counts</span><span>Naive Bayes Training</span><span>Prediction</span></div>\n            </div>\n            <div class=\"lane\">\n              <div class=\"lane-label\">LR</div>\n              <div class=\"lane-steps\"><span>Data</span><span>Preprocessing</span><span>TF-IDF Features</span><span>Logistic Regression</span><span>Prediction</span></div>\n            </div>\n            <div class=\"lane\">\n              <div class=\"lane-label\">SVM</div>\n              <div class=\"lane-steps\"><span>Data</span><span>Preprocessing</span><span>TF-IDF Features</span><span>Linear SVM Training</span><span>Prediction</span></div>\n            </div>\n          </div>\n        </div>\n        <div class=\"setup-strip reveal d4\" aria-label=\"Training setup details\">\n          <p><b>Naive Bayes — formula-driven</b><strong class=\"nb-formula\">P(c) = Nc/N · P(w|c) = (count+1)/(Nwords+|V|).</strong> No vectorizer — classification score computed entirely from log-probabilities.</p>\n          <p><b>Logistic Regression — TF-IDF vectors</b>Text converted to weighted numeric features. TF rewards frequent words; IDF penalises words common across all categories. Enables a linear boundary to separate classes.</p>\n          <p><b>Linear SVM — TF-IDF + max margin</b>Same TF-IDF features as LR. SVM finds the hyperplane that maximises separation between classes — particularly effective on high-dimensional sparse text vectors.</p>\n        </div>\n        <span class=\"slide-no\">03</span>\n        <div class=\"footer\">HUANG YUHAN <span>/ TCM2409003</span></div>\n      </section>\n\n      <section class=\"slide\" data-title=\"Evaluation Method\" aria-hidden=\"true\">\n        <header>\n          <p class=\"kicker reveal\">03 · Why macro F1 matters</p>\n          <h2 class=\"slide-title reveal d2\">Evaluation Method</h2>\n        </header>\n        <div class=\"method-grid\">\n          <div class=\"chart reveal d3\" role=\"img\" aria-label=\"Category distribution chart showing Campus life has 193 samples and IT Support has 43 samples\">\n            <svg viewBox=\"0 0 560 520\">\n              <g font-family=\"Avenir Next, Segoe UI, Arial, sans-serif\" font-size=\"17\" fill=\"#182433\">\n                <text x=\"0\" y=\"23\" font-weight=\"800\" fill=\"#66707a\">Dataset Category Distribution</text>\n                <g transform=\"translate(0 54)\">\n                  <text x=\"0\" y=\"22\">Campus life</text><rect x=\"220\" y=\"2\" width=\"276\" height=\"24\" fill=\"#165a91\"/><text x=\"532\" y=\"22\" text-anchor=\"end\" font-weight=\"800\">193</text>\n                  <text x=\"0\" y=\"76\">Accommodation</text><rect x=\"220\" y=\"56\" width=\"146\" height=\"24\" fill=\"#758878\"/><text x=\"532\" y=\"76\" text-anchor=\"end\" font-weight=\"800\">94</text>\n                  <text x=\"0\" y=\"130\">Academic Affairs</text><rect x=\"220\" y=\"110\" width=\"110\" height=\"24\" fill=\"#758878\"/><text x=\"532\" y=\"130\" text-anchor=\"end\" font-weight=\"800\">71</text>\n                  <text x=\"0\" y=\"184\">Registration</text><rect x=\"220\" y=\"164\" width=\"99\" height=\"24\" fill=\"#758878\"/><text x=\"532\" y=\"184\" text-anchor=\"end\" font-weight=\"800\">64</text>\n                  <text x=\"0\" y=\"238\">Transportation</text><rect x=\"220\" y=\"218\" width=\"82\" height=\"24\" fill=\"#758878\"/><text x=\"532\" y=\"238\" text-anchor=\"end\" font-weight=\"800\">53</text>\n                  <text x=\"0\" y=\"292\">Finance & Fees</text><rect x=\"220\" y=\"272\" width=\"81\" height=\"24\" fill=\"#758878\"/><text x=\"532\" y=\"292\" text-anchor=\"end\" font-weight=\"800\">52</text>\n                  <text x=\"0\" y=\"346\">Campus Services</text><rect x=\"220\" y=\"326\" width=\"81\" height=\"24\" fill=\"#d5a63f\"/><text x=\"532\" y=\"346\" text-anchor=\"end\" font-weight=\"800\">52</text>\n                  <text x=\"0\" y=\"400\">IT Support</text><rect x=\"220\" y=\"380\" width=\"67\" height=\"24\" fill=\"#c86546\"/><text x=\"532\" y=\"400\" text-anchor=\"end\" font-weight=\"800\">43</text>\n                </g>\n              </g>\n            </svg>\n          </div>\n          <div class=\"method-copy reveal d4\">\n            <div style=\"border-left:3px solid #c86546;background:rgba(255,253,248,.66);padding:14px 16px;\">\n              <p style=\"margin:0 0 6px;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue-dark);\">The long-tail problem</p>\n              <p style=\"margin:0;font-size:15px;line-height:1.34;color:var(--ink);\">A few categories hold most of the questions while many have only a handful. A model can look strong on overall accuracy by getting the big classes right, yet quietly fail the small tail classes, such as fees or IT accounts, that students still ask about.</p>\n            </div>\n            <p style=\"margin:0;font-weight:800;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--blue-dark);\">How we measure model quality</p>\n            <div class=\"metric-list\" aria-label=\"Evaluation criteria\">\n              <span>Report accuracy and macro F1 together</span>\n              <span>Macro F1 weights every class equally</span>\n              <span>Per-class precision, recall, and F1</span>\n              <span>Train-test gap to catch overfitting</span>\n              <span>Stratified 5-fold CV grouped by FAQ id</span>\n              <span>Confidence fallback when scores are low</span>\n            </div>\n        </div>\n        <span class=\"slide-no\">04</span>\n        <div class=\"footer\">HUANG YUHAN <span>/ TCM2409003</span></div>\n      </section>\n\n      <section class=\"slide\" data-title=\"Performance Comparison\" aria-hidden=\"true\">\n        <header>\n          <p class=\"kicker reveal\">04 · Held-out test evidence</p>\n          <h2 class=\"slide-title reveal d2\">Performance Comparison</h2>\n        </header>\n        <div class=\"performance-grid\">\n          <div class=\"reveal d3\">\n            <div class=\"legend\"><span>Test Accuracy</span><span>Macro F1</span></div>\n            <div class=\"bar-chart\" role=\"img\" aria-label=\"Grouped bar chart comparing test accuracy and macro F1 for Naive Bayes, Logistic Regression, and Linear SVM\">\n              <div class=\"bar-row\">\n                <p class=\"bar-label\">Naive<br>Bayes</p>\n                <div class=\"bars\">\n                  <div class=\"bar\"><span style=\"width:72.80%\"></span><b>0.7280</b></div>\n                  <div class=\"bar f1\"><span style=\"width:64.28%\"></span><b>0.6428</b></div>\n                </div>\n              </div>\n              <div class=\"bar-row\">\n                <p class=\"bar-label\">Logistic<br>Regression</p>\n                <div class=\"bars\">\n                  <div class=\"bar\"><span style=\"width:74.40%\"></span><b>0.7440</b></div>\n                  <div class=\"bar f1\"><span style=\"width:69.05%\"></span><b>0.6905</b></div>\n                </div>\n              </div>\n              <div class=\"bar-row\">\n                <p class=\"bar-label\">Linear<br>SVM</p>\n                <div class=\"bars\">\n                  <div class=\"bar\"><span style=\"width:76.80%\"></span><b>0.7680</b></div>\n                  <div class=\"bar f1\"><span style=\"width:71.86%\"></span><b>0.7186</b></div>\n                </div>\n              </div>\n            </div>\n                      <div style=\"margin-top:20px;border-top:1px solid var(--line);padding-top:14px;\">\n              <p class=\"mini-label\">Training time (relative)</p>\n              <div style=\"display:grid;gap:9px;margin-top:12px;\">\n                <div style=\"display:flex;align-items:center;gap:12px;font-size:14px;color:var(--ink);\">\n                <span style=\"flex:0 0 160px;\">Naive Bayes</span>\n                <span style=\"flex:1;height:13px;background:#F3F4F6;border-radius:4px;display:block;\"><span style=\"display:block;height:13px;width:15%;background:#c86546;border-radius:4px;\"></span></span>\n                <b style=\"flex:0 0 72px;text-align:right;color:var(--muted);font-weight:800;\">Fast</b>\n              </div>\n                <div style=\"display:flex;align-items:center;gap:12px;font-size:14px;color:var(--ink);\">\n                <span style=\"flex:0 0 160px;\">Linear SVM</span>\n                <span style=\"flex:1;height:13px;background:#F3F4F6;border-radius:4px;display:block;\"><span style=\"display:block;height:13px;width:45%;background:#c86546;border-radius:4px;\"></span></span>\n                <b style=\"flex:0 0 72px;text-align:right;color:var(--muted);font-weight:800;\">Medium</b>\n              </div>\n                <div style=\"display:flex;align-items:center;gap:12px;font-size:14px;color:var(--ink);\">\n                <span style=\"flex:0 0 160px;\">Logistic Regression</span>\n                <span style=\"flex:1;height:13px;background:#F3F4F6;border-radius:4px;display:block;\"><span style=\"display:block;height:13px;width:100%;background:#c86546;border-radius:4px;\"></span></span>\n                <b style=\"flex:0 0 72px;text-align:right;color:var(--muted);font-weight:800;\">Slow</b>\n              </div>\n              </div>\n              <p style=\"margin:10px 0 0;font-size:12px;color:var(--muted);\">Longer bar = slower training; all three train fast enough here.</p>\n            </div>\n          </div>\n          <div class=\"callout-stack reveal d4\">\n            <div class=\"result-card\">\n              <p class=\"mini-label\">Best test-set model</p>\n              <strong>Linear SVM</strong>\n              <p>Accuracy 0.7680, macro F1 0.7186, smallest train-test gap (0.2119). The accuracy-F1 gap comes from weaker tail classes, shown next.</p>\n            </div>\n            <div class=\"small-facts\">\n              <p><b>Naive Bayes</b><span style=\"display:flex;gap:9px;color:var(--sage);font-size:15px;line-height:1.3;margin-top:5px;\"><span style=\"font-weight:800;flex:0 0 auto;\">&#10003;</span><span style=\"color:var(--ink);\">Fastest and simplest to train</span></span><span style=\"display:flex;gap:9px;color:var(--terracotta);font-size:15px;line-height:1.3;margin-top:5px;\"><span style=\"font-weight:800;flex:0 0 auto;\">&#10007;</span><span style=\"color:var(--ink);\">Weakest macro F1, so it misses rare classes</span></span></p>\n              <p><b>Logistic Regression</b><span style=\"display:flex;gap:9px;color:var(--sage);font-size:15px;line-height:1.3;margin-top:5px;\"><span style=\"font-weight:800;flex:0 0 auto;\">&#10003;</span><span style=\"color:var(--ink);\">Interpretable baseline; clearly beats Naive Bayes</span></span><span style=\"display:flex;gap:9px;color:var(--terracotta);font-size:15px;line-height:1.3;margin-top:5px;\"><span style=\"font-weight:800;flex:0 0 auto;\">&#10007;</span><span style=\"color:var(--ink);\">Trails SVM and overfits more (larger gap)</span></span></p>\n              <p><b>Linear SVM</b><span style=\"display:flex;gap:9px;color:var(--sage);font-size:15px;line-height:1.3;margin-top:5px;\"><span style=\"font-weight:800;flex:0 0 auto;\">&#10003;</span><span style=\"color:var(--ink);\">Best test accuracy and macro F1</span></span><span style=\"display:flex;gap:9px;color:var(--sage);font-size:15px;line-height:1.3;margin-top:5px;\"><span style=\"font-weight:800;flex:0 0 auto;\">&#10003;</span><span style=\"color:var(--ink);\">Best generalization: smallest train-test gap</span></span></p>\n            </div>\n          </div>\n        </div>\n        <span class=\"slide-no\">05</span>\n        <div class=\"footer\">HUANG YUHAN <span>/ TCM2409003</span></div>\n      </section>\n\n      <section class=\"slide conclusion\" data-title=\"Conclusion and Insights\" aria-hidden=\"true\">\n        <div>\n          <p class=\"kicker reveal\">05 · Practical choice</p>\n          <h2 class=\"slide-title reveal d2\">Conclusion and Insights</h2>\n          <p class=\"mini-label\" style=\"margin-top:4px;\">Summary &mdash; what it means for the FAQ bot</p>\n          <div class=\"insights reveal d3\">\n            <div class=\"insight\"><b>01</b><p>Routes each freshman question into 1 of 8 FAQ topics, so retrieval starts in the right category.</p></div>\n            <div class=\"insight\"><b>02</b><p>Strong on common topics like Campus life and Academic Affairs, so most real enquiries route correctly.</p></div>\n            <div class=\"insight\"><b>03</b><p>Weak on rare topics like IT Support and Campus Services: few FAQ samples make these long-tail classes hard.</p></div>\n          </div>\n        </div>\n        <div class=\"f1-panel reveal d4\">\n          <p class=\"mini-label\">Linear SVM per-class F1</p>\n          <table class=\"f1-table\" aria-label=\"Linear SVM per-class F1 scores\">\n            <thead><tr><th>Category</th><th>Precision</th><th>Recall</th><th>F1</th></tr></thead>\n            <tbody>\n              <tr><td>Campus life</td><td>0.8780</td><td>0.9231</td><td>0.9000</td></tr>\n              <tr><td>Academic Affairs</td><td>0.8571</td><td>0.8571</td><td>0.8571</td></tr>\n              <tr><td>Registration & Orientation</td><td>1.0000</td><td>0.6923</td><td>0.8182</td></tr>\n              <tr><td>Accommodation & Living</td><td>0.7500</td><td>0.7895</td><td>0.7692</td></tr>\n              <tr><td>Transportation</td><td>0.6667</td><td>0.7273</td><td>0.6957</td></tr>\n              <tr><td>Finance & Fees</td><td>0.7500</td><td>0.6000</td><td>0.6667</td></tr>\n              <tr><td>IT Support</td><td>0.7143</td><td>0.5556</td><td>0.6250</td></tr>\n              <tr><td>Campus Services</td><td>0.3571</td><td>0.5000</td><td>0.4167</td></tr>\n            </tbody>\n          </table>\n        </div>\n        <div class=\"reveal d4\" style=\"position:absolute;left:92px;right:92px;bottom:96px;\" aria-label=\"Future improvement directions\">\n          <p class=\"mini-label\" style=\"margin-bottom:12px;\">Future improvements &mdash; training</p>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px;\">\n            <article style=\"border-top:1px solid var(--line);padding:13px 18px 0;background:rgba(255,253,248,.56);min-height:84px;\"><b style=\"display:block;color:var(--terracotta);font-family:Georgia,serif;font-size:23px;font-weight:500;line-height:1;\">Balance</b><p style=\"margin-top:7px;color:var(--muted);font-size:15px;line-height:1.28;\">Collect more freshman FAQ questions for small topics like IT Support and Campus Services to ease the long tail.</p></article>\n            <article style=\"border-top:1px solid var(--line);padding:13px 18px 0;background:rgba(255,253,248,.56);min-height:84px;\"><b style=\"display:block;color:var(--terracotta);font-family:Georgia,serif;font-size:23px;font-weight:500;line-height:1;\">Augment</b><p style=\"margin-top:7px;color:var(--muted);font-size:15px;line-height:1.28;\">Paraphrase existing FAQ questions to grow the minority topics without heavy manual labeling.</p></article>\n            <article style=\"border-top:1px solid var(--line);padding:13px 18px 0;background:rgba(255,253,248,.56);min-height:84px;\"><b style=\"display:block;color:var(--terracotta);font-family:Georgia,serif;font-size:23px;font-weight:500;line-height:1;\">Tune</b><p style=\"margin-top:7px;color:var(--muted);font-size:15px;line-height:1.28;\">Re-tune the classifier and TF-IDF features, and sharpen overlapping FAQ wording.</p></article>\n          </div>\n        </div>\n        <span class=\"slide-no\">06</span>\n        <div class=\"footer\">HUANG YUHAN <span>/ TCM2409003</span></div>\n      </section>\n\n      <button class=\"nav-zone prev\" type=\"button\" aria-label=\"Previous slide\"></button>\n      <button class=\"nav-zone next\" type=\"button\" aria-label=\"Next slide\"></button>\n      <div class=\"progress\" aria-hidden=\"true\"><span></span></div>\n      <div class=\"counter\" aria-live=\"polite\"></div>\n    </main>\n  </div>\n\n  <script>\n    (() => {\n      const deck = document.querySelector('.deck');\n      const stage = document.querySelector('.stage');\n      const slides = [...document.querySelectorAll('.slide')];\n      const counter = document.querySelector('.counter');\n      const progress = document.querySelector('.progress > span');\n      const prevButton = document.querySelector('.nav-zone.prev');\n      const nextButton = document.querySelector('.nav-zone.next');\n      let index = Math.max(0, Math.min(slides.length - 1, 0));\n      let touchStartX = null;\n\n      function resizeStage() {\n        const scale = Math.min(stage.clientWidth / 1600, stage.clientHeight / 900);\n        deck.style.setProperty('--deck-scale', String(scale));\n      }\n\n      const isEditing = (target) => target instanceof Element && Boolean(target.closest('input, textarea, select, button:not(.nav-zone), [contenteditable=\"true\"]'));\n\n      function render(nextIndex, updateHash = true) {\n        index = Math.max(0, Math.min(slides.length - 1, nextIndex));\n        slides.forEach((slide, slideIndex) => {\n          const active = slideIndex === index;\n          slide.classList.toggle('is-active', active);\n          slide.setAttribute('aria-hidden', String(!active));\n        });\n        counter.textContent = `${String(index + 1).padStart(2, '0')} / ${String(slides.length).padStart(2, '0')}`;\n        progress.style.width = `${((index + 1) / slides.length) * 100}%`;\n        const title = slides[index]?.dataset.title;\n        document.title = title ? `${title} — Machine Learning Classification` : 'Machine Learning Classification';\n        \n        slides[index]?.focus({ preventScroll: true });\n      }\n\n      function goForward() { render(index + 1); }\n      function goBack() { render(index - 1); }\n\n      function enterFullscreen() {\n        if (!document.fullscreenElement) deck.requestFullscreen?.().catch(() => {});\n        else document.exitFullscreen?.().catch(() => {});\n      }\n\n      document.addEventListener('keydown', (event) => {\n        if (isEditing(event.target)) return;\n        const nextKeys = ['ArrowRight', 'ArrowDown', 'PageDown', ' '];\n        const prevKeys = ['ArrowLeft', 'ArrowUp', 'PageUp'];\n        if (nextKeys.includes(event.key)) { event.preventDefault(); goForward(); }\n        else if (prevKeys.includes(event.key)) { event.preventDefault(); goBack(); }\n        else if (event.key === 'Home') { event.preventDefault(); render(0); }\n        else if (event.key === 'End') { event.preventDefault(); render(slides.length - 1); }\n        else if (event.key.toLowerCase() === 'f') { event.preventDefault(); enterFullscreen(); }\n      });\n\n      prevButton.addEventListener('click', () => goBack());\n      nextButton.addEventListener('click', () => goForward());\n      deck.addEventListener('click', (event) => {\n        if (isEditing(event.target) || event.target.closest('.nav-zone')) return;\n        goForward();\n      });\n      \n      deck.addEventListener('touchstart', (event) => { touchStartX = event.changedTouches[0]?.clientX ?? null; }, { passive: true });\n      deck.addEventListener('touchend', (event) => {\n        if (touchStartX === null) return;\n        const distance = (event.changedTouches[0]?.clientX ?? touchStartX) - touchStartX;\n        touchStartX = null;\n        if (Math.abs(distance) < 48) return;\n        if (distance < 0) goForward();\n        el
